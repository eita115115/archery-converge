<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#121412">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Converge">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Converge</title>
<style>
:root{
  --void:#121412;--panel:#1a1c18;--line:#2a2c26;--line2:#383a32;
  --text:#e8e6dc;--mute:#8a8878;--dim:#5c5a4e;
  --hit:#5ecf7a;--warn:#e8b040;--beat:#e06050;--sight:#9b7cf0;
  --gold:#d4a72c;--red:#c73e3a;--blue:#3d8fd4;--ink:#161614;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;padding:0;overflow-x:hidden;background:var(--void);color:var(--text);touch-action:manipulation;-ms-touch-action:manipulation}
body{font-family:var(--sans);font-size:15px;-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%;text-size-adjust:100%}
input,select,textarea{-webkit-user-select:auto;user-select:auto}
button:focus-visible,input:focus-visible{outline:2px solid var(--hit);outline-offset:2px}

.frame{position:relative;min-height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto}
.phase-arc{flex-shrink:0;padding:8px 12px 4px;padding-top:calc(8px + env(safe-area-inset-top))}
.phase-arc svg{display:block;width:100%;height:36px}
.phase-arc .lbl{font-size:11px;fill:var(--dim)}
.phase-arc .lbl.on{fill:var(--text);font-weight:600}
.phase-arc .seg{fill:none;stroke:var(--line);stroke-width:6;stroke-linecap:round}
.phase-arc .seg.on{stroke:var(--hit)}
.phase-arc .seg.cur{stroke:var(--warn)}

.hdr{display:flex;align-items:center;gap:10px;padding:4px 14px 8px;min-height:40px}
.hdr .back{background:none;border:none;color:var(--mute);font-size:13px;cursor:pointer;padding:8px 4px;min-width:44px}
.hdr .title{flex:1;text-align:center;font-size:13px;color:var(--mute)}
.hdr .gap{min-width:44px}

.body{flex:1;padding:0 12px 12px;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
.body.fill{display:flex;flex-direction:column;min-height:0}
.body.tight{padding:0 6px 8px}

/* distance rings */
.dist-wrap{display:flex;justify-content:center;padding:20px 0 12px}
.dist-svg{width:min(280px,88vw);height:min(280px,88vw);touch-action:manipulation}
.dist-svg .ring{cursor:pointer;fill:none;stroke:var(--line2);stroke-width:14;transition:stroke .2s,stroke-width .2s}
.dist-svg .ring.on{stroke:var(--hit);stroke-width:18}
.dist-svg .ring.lab{stroke:none;fill:var(--dim);font-size:11px;text-anchor:middle}
.dist-svg .center{fill:none;stroke:var(--line);stroke-width:1}
.dist-val{text-align:center;font-size:42px;font-weight:700;color:var(--text);line-height:1}
.dist-val small{font-size:16px;color:var(--mute);font-weight:400}

/* sight crosshair setup */
.sight-x{display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:auto auto auto;gap:6px;align-items:center;max-width:300px;margin:16px auto}
.sight-x .ax{font-size:10px;color:var(--dim);text-align:center;letter-spacing:.06em}
.sight-x .core{width:72px;height:72px;position:relative}
.sight-x .core svg{width:100%;height:100%}
.sight-x input{width:100%;padding:12px 8px;border:1px solid var(--line);border-radius:50px;
  background:var(--panel);color:var(--text);font-size:18px;text-align:center}
.sight-x .v-up{grid-column:2}.sight-x .v-dn{grid-column:2}
.sight-x .h-l{grid-column:1;grid-row:2}.sight-x .h-r{grid-column:3;grid-row:2}
.sight-x .core{grid-column:2;grid-row:2}

.note-inp{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:24px;
  background:var(--panel);color:var(--text);font-size:14px;min-height:44px;resize:none;margin-top:12px}

/* target hero */
.tgt-stage{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;touch-action:none;-ms-touch-action:none}
.tgt-stage .box{position:relative;width:100%;max-width:min(100vw - 24px, 480px);transform-origin:center center}
.tgt-stage .box svg.face{width:100%;display:block;touch-action:none;-ms-touch-action:none}
.tgt-geo{position:absolute;inset:0;pointer-events:none}
.tgt-geo svg{width:100%;height:100%;display:block}
.slot-ring{position:absolute;inset:-8%;pointer-events:none}
.slot-ring svg{width:100%;height:100%;display:block}

.lens{position:absolute;top:4px;width:108px;height:108px;border-radius:50%;border:2px solid var(--hit);
  background:#222420;display:none;pointer-events:none;overflow:hidden;box-shadow:0 0 16px rgba(0,0,0,.5)}
.lens.fine{border-color:var(--warn)}.lens.cut{border-color:var(--hit)}

.geo-nums{position:absolute;bottom:4px;right:4px;display:flex;gap:6px;font-size:10px;color:var(--dim);pointer-events:none}
.geo-nums b{color:var(--mute);font-weight:600}

/* return: grouping + sight dial */
.ret-geo{display:flex;flex-direction:column;align-items:center;gap:8px}
.ret-geo .mini{width:min(240px,70vw)}
.ret-geo .mini .box{transform:scale(1)}

.sight-dial{width:min(260px,80vw);margin:8px auto}
.sight-dial svg{width:100%;display:block}
.sight-dial .tick{stroke:var(--line2);stroke-width:1}
.sight-dial .axis{stroke:var(--line);stroke-width:1.5;opacity:.6}
.sight-dial .start{fill:var(--dim)}
.sight-dial .now{fill:var(--sight);stroke:#fff;stroke-width:1.5}
.sight-dial .sug{stroke:var(--warn);stroke-width:2.5;marker-end:url(#arr)}
.sight-dial .lbl{font-size:9px;fill:var(--dim)}
.sight-dial input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.sight-adj{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.sight-adj input{padding:12px;border:1px solid var(--line);border-radius:50px;background:var(--panel);color:var(--text);font-size:17px;text-align:center;width:100%}

.end-badge{text-align:center;padding:6px 0}
.end-badge .n{font-size:32px;font-weight:700;color:var(--warn)}
.end-badge .s{font-size:12px;color:var(--dim);margin-top:2px}

.btn{
  display:block;width:100%;padding:16px;border-radius:50px;border:none;
  font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);
}
.btn.hit{background:var(--hit);color:var(--void)}
.btn.beat{background:var(--beat);color:#fff}
.btn.ghost{background:transparent;color:var(--mute);border:1px solid var(--line)}
.btn.sm{padding:10px 16px;font-size:13px;width:auto;border-radius:24px}
.btn:disabled{opacity:.3}
.foot{padding:8px 12px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.foot .row{display:flex;gap:8px}.foot .row .btn{flex:1}

.home-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100dvh - 80px);text-align:center;padding:20px}
.home-rings{width:120px;height:120px;margin-bottom:24px}
.home-rings svg{width:100%;height:100%}
.home-wrap p{margin:12px 0 0;font-size:13px;color:var(--dim);line-height:1.6}
.home-links{display:flex;gap:20px;margin-top:24px}
.home-links button{background:none;border:none;color:var(--mute);font-size:13px;cursor:pointer;text-decoration:underline;padding:8px}

.hist-row{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.hist-row .d{font-size:15px}
.hist-row .m{font-size:12px;color:var(--dim);margin-top:2px}
.hist-row .pts{font-size:22px;font-weight:700;color:var(--hit)}

.gear-inp{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--text);font-size:16px;margin-bottom:10px}
.gear-lbl{font-size:11px;color:var(--dim);margin:12px 0 4px}

.pulse{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;background:rgba(18,20,18,.85)}
.pulse.on{opacity:1;pointer-events:auto}
.pulse svg{width:160px;height:160px}
.pulse .val{font-size:40px;font-weight:700;fill:var(--warn)}

.toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:80;
  background:var(--panel);border:1px solid var(--line);padding:8px 16px;border-radius:24px;
  font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.updbar{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:70;
  background:var(--hit);color:var(--void);padding:8px 16px;border-radius:24px;font-size:12px;font-weight:700;cursor:pointer;display:none}
.empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:14px}

.wind-compass{display:flex;justify-content:center;padding:8px 0 4px}
.wind-compass svg{width:min(200px,62vw);height:min(200px,62vw);touch-action:manipulation}
.wind-compass .wbtn{cursor:pointer;fill:var(--line);stroke:none;transition:fill .2s}
.wind-compass .wbtn.on{fill:var(--hit)}
.wind-compass .wlbl{font-size:9px;fill:var(--dim);text-anchor:middle;pointer-events:none}
.wind-compass .wlbl.on{fill:var(--text);font-weight:600}
.wind-spd{display:flex;gap:6px;justify-content:center;margin:6px 0 4px}
.wind-spd button{padding:8px 14px;border:1px solid var(--line);border-radius:20px;background:var(--panel);color:var(--mute);font-size:13px;cursor:pointer}
.wind-spd button.on{border-color:var(--hit);color:var(--hit)}

.phys-badge{text-align:center;padding:6px 12px;margin:4px auto;max-width:300px;border-radius:20px;font-size:13px;font-weight:600}
.phys-badge.ok{background:rgba(94,207,122,.12);color:var(--hit)}
.phys-badge.mid{background:rgba(232,176,64,.12);color:var(--warn)}
.phys-badge.hold{background:rgba(155,124,240,.1);color:var(--sight)}
.phys-badge.warn{background:rgba(224,96,80,.1);color:var(--beat)}
.phys-hint{text-align:center;font-size:11px;color:var(--dim);line-height:1.5;padding:0 12px;margin:4px 0}
.phys-traj{text-align:center;font-size:10px;color:var(--dim);padding:2px 8px}

.gear-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gear-grid .full{grid-column:1/-1}
.gear-sep{height:1px;background:var(--line);margin:14px 0}
</style>
</head>
<body>
<div class="pulse" id="pulse"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="var(--hit)" stroke-width="3" opacity=".4"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="var(--warn)" stroke-width="2" opacity=".6"/>
  <text x="50" y="54" class="val" id="pulseN" text-anchor="middle">—</text></svg></div>
<div class="frame" id="frame"></div>
<div class="updbar" id="updBar">更新あり</div>
<div class="toast" id="toast"></div>

<script src="physics.js"></script>
<script>
"use strict";
const KEY="archeryConverge.v1", APP_VER=6;
const Phy=window.ArcheryPhysics;
const PHASES=["準備","記録","確認"];
const DISTS=[70,50,30,18];
let db=load();
const ui={screen:"home",histId:null,adj:false,_dist:70};

function blankDb(){return{setups:[],sightMarks:[],sessions:[],active:null,settings:{eyeSight:850}};}
function normalizeActive(a){
  if(!a)return null;
  if(!Array.isArray(a.ends))a.ends=[];
  if(!Array.isArray(a.cur))a.cur=[];
  if(!a.sightStart)a.sightStart={v:"",h:""};
  if(!a.sightNow)a.sightNow={...a.sightStart};
  if(!Array.isArray(a.adjLog))a.adjLog=[];
  if(!a.perEnd)a.perEnd=6;
  if(!a.phase)a.phase="record";
  return a;
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(KEY));
    if(d){
      const out=Object.assign(blankDb(),d);
      out.settings=Object.assign({eyeSight:850},out.settings||{});
      out.active=normalizeActive(out.active);
      (out.sessions||[]).forEach(s=>{if(!Array.isArray(s.ends))s.ends=[];});
      return out;
    }
  }catch(e){}
  return blankDb();
}
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function $(s,r){return (r||document).querySelector(s);}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtD(d){const x=new Date(d+"T12:00:00");return `${x.getMonth()+1}/${x.getDate()}`;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function ringW(fd){return fd/20;}
function arrR(fd){return fd/85;}
function lineR(fd){return arrR(fd)+fd/1200;}
function scoreAt(x,y,fd,t){const w=ringW(fd),r=Math.max(0,Math.hypot(x,y)-(t??lineR(fd)));if(r<=w/2)return{s:10,X:true};let s=11-Math.ceil(r/w);return{s:clamp(s,0,10),X:false};}
function rank(h){return h.s*2+(h.X?1:0);}
function lineCut(x,y,fd){return rank(scoreAt(x,y,fd,lineR(fd)))>rank(scoreAt(x,y,fd,0));}
function hitAt(x,y,fd){return Object.assign({x,y},scoreAt(x,y,fd,lineR(fd)));}
function lbl(a){return a.s===0?"M":a.X?"X":String(a.s);}
function stats(ar){return Phy.robustStats(ar);}
function getSetup(){return db.setups[0]||{};}
function sessForPhy(s){return{id:s.id,date:s.date,dist:s.dist,faceD:s.faceD,setupId:s.setupId,windDir:s.windDir,windSpeed:s.windSpeed,sightNow:s.sightNow,sightStart:s.sightStart};}
function endAdvice(s,arrows){return Phy.adviceForEnd(db,db.settings,getSetup(),sessForPhy(s),arrows);}
function sugFromAdv(adv,j){
  if(!adv||!adv.vector)return null;
  const sc=j&&j.scale!=null?j.scale:1;
  return{h:adv.vector.h*sc,v:adv.vector.v*sc,mmH:adv.vector.mmH*sc,mmV:adv.vector.mmV*sc};
}
function mono(v,ax){const a=Math.abs(v).toFixed(1);return ax==="x"?(v>0?`+${a}`:v<0?`-${a}`:"0"):(v>0?`↑${a}`:v<0?`↓${a}`:"—");}

function targetSvg(fd,id){
  const w=ringW(fd),R=fd/2,M=R*1.18;
  const z=[[10,"#f5f3ee"],[9,"#f5f3ee"],[8,"#222"],[7,"#222"],[6,"#3d8fd4"],[5,"#3d8fd4"],[4,"#c73e3a"],[3,"#c73e3a"],[2,"#d4a72c"],[1,"#d4a72c"]];
  let g="";z.forEach(([k,f])=>{g+=`<circle cx="0" cy="0" r="${k*w}" fill="${f}" stroke="${f==="#222"?"#3a3a32":"#222"}" stroke-width="${R/280}"/>`;});
  g+=`<circle cx="0" cy="0" r="${w/2}" fill="none" stroke="#222" stroke-width="${R/280}"/>`;
  g+=`<line x1="${-w/5}" y1="0" x2="${w/5}" y2="0" stroke="#222" stroke-width="${R/280}"/>`;
  g+=`<line x1="0" y1="${-w/5}" x2="0" y2="${w/5}" stroke="#222" stroke-width="${R/280}"/>`;
  return `<svg class="face" id="${id}svg" viewBox="${-M} ${-M} ${2*M} ${2*M}" xmlns="http://www.w3.org/2000/svg">
    <g id="${id}g"><g>${g}</g><g id="${id}marks"></g><g id="${id}cur"></g></g></svg>`;
}
function dot(a,fd,c,l){const r=arrR(fd);return `<g><circle cx="${a.x}" cy="${-a.y}" r="${r}" fill="${c}" stroke="#fff" stroke-width="${r/5}" opacity=".92"/>`
  +(l?`<text x="${a.x}" y="${-a.y}" font-size="${r*1.1}" fill="#fff" text-anchor="middle" dominant-baseline="central" font-weight="bold">${l}</text>`:"")+`</g>`;}
function geoSvg(st,fd,sug){
  if(!st)return "";
  const M=fd/2*1.18,w=fd/600;
  let h=`<line x1="${-M}" y1="0" x2="${M}" y2="0" stroke="var(--hit)" stroke-width="${w}" opacity=".25"/>`;
  h+=`<line x1="0" y1="${-M}" x2="0" y2="${M}" stroke="var(--hit)" stroke-width="${w}" opacity=".25"/>`;
  if(st.major&&st.minor)h+=`<ellipse cx="${st.mx}" cy="${-st.my}" rx="${st.major}" ry="${st.minor}" transform="rotate(${-st.angleDeg} ${st.mx} ${-st.my})" fill="none" stroke="var(--hit)" stroke-width="${fd/450}" opacity=".35" stroke-dasharray="${fd/55} ${fd/85}"/>`;
  h+=`<circle cx="${st.mx}" cy="${-st.my}" r="${st.rr}" fill="none" stroke="var(--hit)" stroke-width="${fd/400}" opacity=".55" stroke-dasharray="${fd/45} ${fd/70}"/>`;
  h+=`<circle cx="${st.mx}" cy="${-st.my}" r="${fd/90}" fill="var(--warn)" stroke="#fff" stroke-width="${fd/800}"/>`;
  if(sug&&(sug.h||sug.v)){
    const L=Math.min(M*.38,Math.hypot(sug.h,sug.v)*.16+6);
    const ang=Math.atan2(-sug.v,sug.h),ex=Math.cos(ang)*L,ey=Math.sin(ang)*L;
    h+=`<line x1="0" y1="0" x2="${ex}" y2="${ey}" stroke="var(--sight)" stroke-width="${fd/320}" marker-end="url(#geoArr)"/>`;
  }
  return h;
}

const WIND_DIRS=[{id:"",lbl:"無風",a:0},{id:"向かい風",lbl:"向かい",a:-90},{id:"追い風",lbl:"追い",a:90},{id:"左から",lbl:"左",a:180},{id:"右から",lbl:"右",a:0}];
const WIND_SPD=[0,2,4,6];
function windCompass(dir,spd){
  const cx=50,cy=50,R=38;
  let btns="";
  [{id:"向かい風",a:0},{id:"追い風",a:180},{id:"左から",a:270},{id:"右から",a:90}].forEach(w=>{
    const rad=w.a*Math.PI/180,x=cx+R*Math.sin(rad),y=cy-R*Math.cos(rad);
    const on=dir===w.id;
    btns+=`<circle class="wbtn${on?" on":""}" data-wd="${w.id}" cx="${x}" cy="${y}" r="11"/>`;
    btns+=`<text class="wlbl${on?" on":""}" x="${x}" y="${y+3}">${w.id==="向かい風"?"向":w.id==="追い風"?"追":w.id==="左から"?"左":"右"}</text>`;
  });
  btns+=`<circle class="wbtn${!dir?" on":""}" data-wd="" cx="${cx}" cy="${cy}" r="9" opacity="${dir?"":".9"}"/>`;
  btns+=`<text class="wlbl${!dir?" on":""}" x="${cx}" y="${cy+3}">無</text>`;
  const spdBtns=WIND_SPD.map(v=>`<button type="button" class="ws${v===spd?" on":""}" data-ws="${v}">${v||"—"}</button>`).join("");
  return `<div class="wind-compass"><svg viewBox="0 0 100 100">
    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--line)" stroke-width="1"/>
    <line x1="${cx}" y1="${cy-R}" x2="${cx}" y2="${cy+R}" stroke="var(--line)" stroke-width=".5" opacity=".5"/>
    <line x1="${cx-R}" y1="${cy}" x2="${cx+R}" y2="${cy}" stroke="var(--line)" stroke-width=".5" opacity=".5"/>
    ${btns}</svg></div>
    <div class="wind-spd">${spdBtns}<span style="font-size:11px;color:var(--dim);align-self:center">m/s</span></div>`;
}
function physBadgeHtml(j){
  if(!j)return "";
  const cls=j.tone==="ok"?"ok":j.tone==="warn"?"warn":j.tone==="hold"?"hold":"mid";
  return `<div class="phys-badge ${cls}">${j.label}</div><div class="phys-hint">${esc(j.text)}</div>`;
}
function moveHintHtml(adv){
  if(!adv||!adv.moves.length)return `<div class="phys-hint">中心は良好 — サイト調整不要</div>`;
  return adv.moves.map(m=>{
    let t=`${m.dir}へ ${m.cm.toFixed(1)}cm`;
    if(m.mm)t+=` · ${m.mm.toFixed(1)}mm`;
    if(m.clicks!=null)t+=` · ${m.clicks.toFixed(1)}目盛`;
    return `<div class="phys-hint">${m.axis==="v"?"上下":"左右"}: ${t}</div>`;
  }).join("");
}
function trajHintHtml(adv){
  if(!adv||!adv.model||!adv.model.traj)return "";
  const t=adv.model.traj,p=t.phys;
  return `<div class="phys-traj">${t.engine} · ${p.speedFps.toFixed(0)}fps · ${p.massGr.toFixed(0)}gr · ${t.tof.toFixed(2)}s · 信頼${Math.round((adv.confidence||0)*100)}%</div>`;
}

function phaseArc(cur){
  const w=360,paths=DISTS.length;
  const segs=PHASES.map((p,i)=>{
    const x1=20+i*(w-40)/3,x2=20+(i+1)*(w-40)/3,mid=(x1+x2)/2;
    const on=i<=cur,active=i===cur;
    return `<path class="seg${on?" on":""}${active?" cur":""}" d="M${x1+8} 22 A 40 40 0 0 1 ${x2-8} 22"/>
      <text class="lbl${active?" on":""}" x="${mid}" y="14" text-anchor="middle">${p}</text>`;
  }).join("");
  return `<div class="phase-arc"><svg viewBox="0 0 ${w} 36" xmlns="http://www.w3.org/2000/svg">${segs}</svg></div>`;
}

function distRings(dist){
  const cx=100,cy=100,radii=[88,66,44,22];
  let rings="";
  DISTS.forEach((d,i)=>{
    const r=radii[i],on=d===dist;
    rings+=`<circle class="ring${on?" on":""}" data-d="${d}" cx="${cx}" cy="${cy}" r="${r}"/>`;
    rings+=`<text class="ring lab" x="${cx}" y="${cy-r+5}" font-size="10" fill="${on?"var(--hit)":"var(--dim)"}">${d}</text>`;
  });
  rings+=`<circle class="center" cx="${cx}" cy="${cy}" r="6"/>`;
  rings+=`<text x="${cx}" y="${cy+6}" text-anchor="middle" font-size="28" font-weight="700" fill="var(--text)">${dist}</text>`;
  rings+=`<text x="${cx}" y="${cy+22}" text-anchor="middle" font-size="12" fill="var(--mute)">m</text>`;
  return `<div class="dist-wrap"><svg class="dist-svg" viewBox="0 0 200 200">${rings}</svg></div>`;
}

function slotRing(cur,pe,fd){
  const cx=50,cy=50,R=46,seg=360/pe,gap=4;
  let s="";
  for(let i=0;i<pe;i++){
    const a0=(i*seg-90+gap/2)*Math.PI/180,a1=((i+1)*seg-90-gap/2)*Math.PI/180;
    const x1=cx+R*Math.cos(a0),y1=cy+R*Math.sin(a0),x2=cx+R*Math.cos(a1),y2=cy+R*Math.sin(a1);
    const hit=cur[i],active=i===cur.length;
    const col=hit?(hit.s>=9?"var(--warn)":"var(--hit)"):(active?"var(--text)":"var(--line)");
    const op=hit?.6:active?.35:.15;
    s+=`<path d="M${x1} ${y1} A ${R} ${R} 0 0 1 ${x2} ${y2}" fill="none" stroke="${col}" stroke-width="${active?5:4}" opacity="${op}" stroke-linecap="round"/>`;
    if(hit){
      const mid=(a0+a1)/2,tx=cx+(R-8)*Math.cos(mid),ty=cy+(R-8)*Math.sin(mid);
      s+=`<text x="${tx}" y="${ty}" font-size="7" fill="${col}" text-anchor="middle" dominant-baseline="central" font-weight="700">${lbl(hit)}</text>`;
    }
  }
  return `<div class="slot-ring"><svg viewBox="0 0 100 100">${s}</svg></div>`;
}

function sightDial(s0,now,sug,adv){
  const cx=80,cy=80,R=55;
  let ticks="";
  for(let i=0;i<24;i++){const a=i*15*Math.PI/180,x1=cx+(R-4)*Math.cos(a),y1=cy+(R-4)*Math.sin(a),x2=cx+R*Math.cos(a),y2=cy+R*Math.sin(a);
    ticks+=`<line class="tick" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;}
  const parse=n=>{const v=parseFloat(String(n).replace(/[^\d.-]/g,""));return isNaN(v)?0:clamp(v,-20,20);};
  const sv=parse(s0.v),sh=parse(s0.h),nv=parse(now.v),nh=parse(now.h);
  const scale=2.2;
  const sx=cx+sh*scale,sy=cy-sv*scale,nx=cx+nh*scale,ny=cy-nv*scale;
  let sugLine="",sugDot="";
  if(sug&&(sug.h||sug.v)){
    const ex=cx+sug.h*scale*.85,ey=cy-sug.v*scale*.85;
    sugLine=`<line class="sug" x1="${nx}" y1="${ny}" x2="${ex}" y2="${ey}"/>`;
    sugDot=`<circle cx="${ex}" cy="${ey}" r="5" fill="none" stroke="var(--warn)" stroke-width="2" stroke-dasharray="2 2"/>`;
  }
  const rec=adv&&adv.moves.length?`<text class="lbl" x="${cx}" y="152" text-anchor="middle">推奨 ${adv.moves.map(m=>m.dir).join("·")}</text>`:
    `<text class="lbl" x="${cx}" y="152" text-anchor="middle">開始 ${esc(s0.v||"—")} / ${esc(s0.h||"—")}</text>`;
  return `<div class="sight-dial"><svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--warn)"/></marker></defs>
    ${ticks}
    <line class="axis" x1="${cx-R}" y1="${cy}" x2="${cx+R}" y2="${cy}"/>
    <line class="axis" x1="${cx}" y1="${cy-R}" x2="${cx}" y2="${cy+R}"/>
    <circle class="start" cx="${sx}" cy="${sy}" r="5"/>
    <circle class="now" cx="${nx}" cy="${ny}" r="7"/>
    ${sugLine}${sugDot}
    <text class="lbl" x="${cx}" y="14" text-anchor="middle">左右</text>
    ${rec}
  </svg></div>`;
}

function sessArr(s){return [...s.ends.flat(),...s.cur];}
function sessTot(s){return sessArr(s).reduce((a,x)=>a+x.s,0);}

function endPulse(n,cb){const p=$("#pulse"),pn=$("#pulseN");pn.textContent=n;p.classList.add("on");
  setTimeout(()=>{p.classList.remove("on");setTimeout(cb,200);},520);}

function shell(phaseIdx,title,back,bodyHtml,footHtml){
  $("#frame").innerHTML=`
    ${phaseIdx>=0?phaseArc(phaseIdx):""}

    </div>
    <div class="body" id="body">${bodyHtml}</div>
    ${footHtml?`<div class="foot" id="foot">${footHtml}</div>`:""}`;
  const bb=$("#backBtn");if(bb)bb.onclick=()=>nav("home");
}

function nav(screen){ui.screen=screen;ui.histId=null;ui.adj=false;render();}

function render(){
  try{
    if(db.active&&ui.screen==="home")ui.screen=db.active.phase||"record";
    if(ui.screen==="home")return renderHome();
    if(ui.screen==="setup")return renderSetup();
    if(ui.screen==="record")return renderRecord();
    if(ui.screen==="return")return renderReturn();
    if(ui.screen==="done")return renderDone();

function renderRecord(){
  const s=db.active;if(!s){nav("home");return;}
  s.phase="record";save();
  const n=s.cur.length,pe=s.perEnd;
  const st=stats(s.cur);
  const adv=n>=3?endAdvice(s,s.cur):null;
  const j=adv?Phy.judgementFor(adv,s):null;
  const sug=sugFromAdv(adv,j);
  const geoDefs=`<defs><marker id="geoArr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="var(--sight)"/></marker></defs>`;
  shell(1,`E${s.ends.length+1} · ${n}/${pe}`,"",`
    <div class="tgt-stage" style="min-height:calc(100dvh - 200px)">
      <div class="box" id="tgBox">
        ${slotRing(s.cur,pe,s.faceD)}
        <div style="position:relative">${targetSvg(s.faceD,"tg")}
          <div class="tgt-geo"><svg viewBox="${-s.faceD/2*1.18} ${-s.faceD/2*1.18} ${s.faceD*1.18} ${s.faceD*1.18}" id="geoLive">${geoDefs}${geoSvg(st,s.faceD,sug)}</svg></div>
          <div class="lens" id="lens"><svg id="lensSvg" width="108" height="108"><use href="#tgg"/></svg></div>
          ${st?`<div class="geo-nums"><span>${mono(st.mx,"x")}</span><span>${mono(st.my,"y")}</span><span>R<b>${st.rr.toFixed(1)}</b></span></div>`:""}
        </div>
      </div>
    </div>`,
    `<button class="btn beat" id="backLine"${n?"":" disabled"}>射線に戻った</button>
     <div class="row" style="margin-top:8px"><button class="btn ghost sm" id="undo">1本戻す</button></div>`);
  paintMarks(s);
  bindTarget(s);
  $("#undo").onclick=()=>{if(s.cur.length){s.cur.pop();save();renderRecord();}};
  $("#backLine").onclick=()=>{
    if(!s.cur.length)return;
    const t=s.cur.reduce((a,x)=>a+x.s,0);
    s.ends.push(s.cur);s.cur=[];
    save();
    endPulse(t,()=>{ui.screen="return";render();});
  };
}

function paintMarks(s){
  let mh="";s.ends.forEach(e=>e.forEach(a=>{mh+=dot(a,s.faceD,"rgba(94,207,122,.22)");}));
  s.cur.forEach(a=>{mh+=dot(a,s.faceD,"var(--hit)",lbl(a));});
  const mk=$("#tgmarks");if(mk)mk.innerHTML=mh;
}

function bindTarget(s){
  const svg=$("#tgsvg"),lens=$("#lens"),lensSvg=$("#lensSvg"),cur=$("#tgcur");
  let drag=null;
  function pt(e){const t=e.changedTouches?.[0]||e.touches?.[0]||e;return t?.clientX!=null?{x:t.clientX,y:t.clientY,id:e.pointerId??t.identifier??"m"}:null;}
  function toS(x,y){const c=svg.getScreenCTM();if(!c)return{x:0,y:0};const p=svg.createSVGPoint();p.x=x;p.y=y;const r=p.matrixTransform(c.inverse());return{x:r.x,y:-r.y};}
  function draw(p){const fine=drag?.fine,cut=fine&&lineCut(p.x,p.y,s.faceD);
    const col=fine?(cut?"var(--hit)":"var(--warn)"):"#fff";
    lens.classList.toggle("fine",!!fine);lens.classList.toggle("cut",!!cut);
    cur.innerHTML=`<circle cx="${p.x}" cy="${-p.y}" r="${arrR(s.faceD)}" fill="none" stroke="${col}" stroke-width="${s.faceD/400}"/>`;
    const z=ringW(s.faceD)*2.2;lensSvg.setAttribute("viewBox",`${p.x-z} ${-p.y-z} ${2*z} ${2*z}`);
    lens.style.left=p.x<0?"auto":"4px";lens.style.right=p.x<0?"4px":"auto";}
  function reset(){if(drag?.tm)clearTimeout(drag.tm);drag=null;cur.innerHTML="";lens.style.display="none";}
  svg.oncontextmenu=e=>e.preventDefault();
  svg.addEventListener("selectstart",e=>e.preventDefault());
  function down(e){if(s.cur.length>=s.perEnd){toast("6本 — 戻る");return;}const cp=pt(e);if(!cp)return;e.preventDefault();
    if(e.pointerId!=null){try{svg.setPointerCapture(e.pointerId);}catch(_){}}
    const p=toS(cp.x,cp.y);
    drag={p,raw:{x:cp.x,y:cp.y},fine:false,id:cp.id,tm:setTimeout(()=>{if(drag){drag.fine=true;draw(drag.p);}},400)};
    lens.style.display="block";draw(p);}
  function move(e){const cp=pt(e);if(!drag||cp.id!==drag.id)return;e.preventDefault();
    const a=toS(cp.x,cp.y),b=toS(drag.raw.x,drag.raw.y),k=drag.fine?.25:1;
    drag.p={x:drag.p.x+(a.x-b.x)*k,y:drag.p.y+(a.y-b.y)*k};drag.raw={x:cp.x,y:cp.y};draw(drag.p);}
  function up(e){const cp=pt(e);if(!drag||cp.id!==drag.id)return;e.preventDefault();clearTimeout(drag.tm);
    const M=s.faceD/2*1.18,p={x:clamp(drag.p.x,-M,M),y:clamp(drag.p.y,-M,M)};reset();
    const h=hitAt(p.x,p.y,s.faceD);s.cur.push({x:+h.x.toFixed(2),y:+h.y.toFixed(2),s:h.s,X:h.X});
    save();renderRecord();}
  function cancel(e){const cp=pt(e);if(!drag||!cp||cp.id===drag.id)reset();}
  if(window.PointerEvent){
    svg.addEventListener("pointerdown",down);svg.addEventListener("pointermove",move);
    svg.addEventListener("pointerup",up);svg.addEventListener("pointercancel",cancel);
  }else{
    svg.addEventListener("touchstart",down,{passive:false});svg.addEventListener("touchmove",move,{passive:false});
    svg.addEventListener("touchend",up,{passive:false});svg.addEventListener("touchcancel",cancel,{passive:false});
  }
}
function blockZoom(){
  let last=0;
  document.addEventListener("touchend",e=>{
    const tag=e.target&&e.target.tagName;
    if(tag&&/^(INPUT|TEXTAREA|SELECT)$/.test(tag))return;
    const now=Date.now();
    if(now-last<320)e.preventDefault();
    last=now;
  },{passive:false,capture:true});
  ["gesturestart","gesturechange","gestureend"].forEach(ev=>{
    document.addEventListener(ev,e=>e.preventDefault(),{passive:false});
  });
}

function renderReturn(){
  const s=db.active;if(!s){nav("home");return;}
  s.phase="return";save();
  const end=s.ends[s.ends.length-1]||[];
  const st=stats(end);
  const tot=end.reduce((a,x)=>a+x.s,0);
  const adv=endAdvice(s,end);
  const j=Phy.judgementFor(adv,s);
  const sug=sugFromAdv(adv,j);
  const sv=s.sightNow?.v??"",sh=s.sightNow?.h??"";
  const s0=s.sightStart||{};
  const geoDefs=`<defs><marker id="geoArr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="var(--sight)"/></marker></defs>`;
  shell(2,`E${s.ends.length}`,"",`
    <div class="end-badge"><div class="n">${tot}</div><div class="s">${end.map(lbl).join(" · ")}</div></div>
    ${physBadgeHtml(j)}

      <div class="mini"><div class="box"><div style="position:relative">${targetSvg(s.faceD,"rt")}
        <div class="tgt-geo"><svg viewBox="${-s.faceD/2*1.18} ${-s.faceD/2*1.18} ${s.faceD*1.18} ${s.faceD*1.18}">${geoDefs}${geoSvg(st,s.faceD,sug)}</svg></div>
      </div></div></div>
      ${sightDial(s0,{v:sv,h:sh},sug,adv)}
      ${moveHintHtml(adv)}${trajHintHtml(adv)}
      ${st?`<div class="geo-nums" style="position:static;justify-content:center;margin:4px 0">
        <span>${mono(st.mx,"x")}</span><span>${mono(st.my,"y")}</span><span>R<b>${st.rr.toFixed(1)}</b></span>${st.excluded&&st.excluded.length?`<span>外${st.excluded.length}</span>`:""}</div>`:""}
      ${ui.adj?`<div class="sight-adj">
        <input id="nv" inputmode="decimal" placeholder="上下" value="${esc(sv)}">
        <input id="nh" inputmode="decimal" placeholder="左右" value="${esc(sh)}">
      </div><textarea class="note-inp" id="adjNote" placeholder="調整メモ（任意）" rows="1"></textarea>`:""}
    </div>`,
    `<div class="row">
      <button class="btn ghost" id="adjBtn">${ui.adj?"保存":"サイトを調整した"}</button>
      <button class="btn hit" id="next">次のエンド</button>
    </div>
    <button class="btn ghost" id="fin" style="margin-top:8px">練習を終える</button>`);
  let mh="";end.forEach(a=>{mh+=dot(a,s.faceD,"var(--hit)",lbl(a));});const rm=$("#rtmarks");if(rm)rm.innerHTML=mh;
  $("#adjBtn").onclick=()=>{
    if(!ui.adj){ui.adj=true;renderReturn();return;}
    const nv=$("#nv").value.trim(),nh=$("#nh").value.trim();
    s.sightNow={v:nv,h:nh};
    s.adjLog.push({end:s.ends.length,date:Date.now(),v:nv,h:nh,note:$("#adjNote").value.trim()});
    const g=db.setups[0];
    if(g)db.sightMarks.push({id:uid(),setupId:g.id,date:today(),dist:s.dist,v:nv,h:nh,tag:"adj"});
    ui.adj=false;save();toast("記録した");renderReturn();
  };
  $("#next").onclick=()=>{ui.screen="record";ui.adj=false;render();};
  $("#fin").onclick=()=>{
    db.sessions.push({...s,cur:[],total:sessTot(s)});delete db.active;save();ui.screen="done";render();
  };
}

function renderHistDetail(){
  const s=db.sessions.find(x=>x.id===ui.histId);
  if(!s){ui.histId=null;return renderHistory();}
  const st=stats(sessArr(s));
  const geoDefs=`<defs><marker id="geoArr" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="var(--sight)"/></marker></defs>`;
  shell(-1,`${fmtD(s.date)} · ${s.dist}m`,"←",`
    <div class="tgt-stage" style="min-height:280px"><div class="box" style="transform:scale(.85)"><div style="position:relative">${targetSvg(s.faceD,"hs")}
      <div class="tgt-geo"><svg viewBox="${-s.faceD/2*1.18} ${-s.faceD/2*1.18} ${s.faceD*1.18} ${s.faceD*1.18}">${geoDefs}${geoSvg(st,s.faceD,null)}</svg></div>
    </div></div></div>
    ${st?`<div class="geo-nums" style="position:static;justify-content:center"><span>${mono(st.mx,"x")}</span><span>${mono(st.my,"y")}</span><span>R<b>${st.rr.toFixed(1)}</b></span></div>`:""}`,
    `<button class="btn ghost" id="del">削除</button>`);
  const bb=$("#backBtn");if(bb)bb.onclick=()=>{ui.histId=null;render();};
  let mh="";s.ends.forEach((e,i)=>e.forEach(a=>{mh+=dot(a,s.faceD,`hsl(${120+i*30},50%,45%)`);}));const hm=$("#hsmarks");if(hm)hm.innerHTML=mh;
  $("#del").onclick=()=>{if(confirm("削除？")){db.sessions=db.sessions.filter(x=>x.id!==s.id);save();ui.histId=null;render();}};
}

function renderGear(){
  const g=getSetup();
  const gp=Phy.gearPrecisionProfile(g);
  shell(-1,"装備","←",`
    <div class="gear-lbl">名前 / 弓</div>
    <div class="gear-grid">
      <input class="gear-inp" id="gn" placeholder="名前" value="${esc(g.name)}">
      <input class="gear-inp" id="gb" placeholder="弓" value="${esc(g.bow)}">
    </div>
    <div class="phys-traj" style="margin:8px 0">物理入力 ${Math.round(gp.score*100)}% — RK4精度に影響</div>
    <div class="gear-sep"></div>
    <div class="gear-lbl">弓・矢（物理エンジン）</div>
    <div class="gear-grid">
      <input class="gear-inp" id="gp" inputmode="decimal" placeholder="ポンド" value="${esc(g.poundage||"")}">
      <input class="gear-inp" id="gd" inputmode="decimal" placeholder="引き尺" value="${esc(g.drawLength||"")}">
      <input class="gear-inp" id="gw" inputmode="decimal" placeholder="矢重量gr" value="${esc(g.arrowWeight||"")}">
      <input class="gear-inp" id="gsp" inputmode="decimal" placeholder="初速fps" value="${esc(g.arrowSpeed||"")}">
      <input class="gear-inp" id="gdi" inputmode="decimal" placeholder="矢径mm" value="${esc(g.arrowDia||"")}">
      <input class="gear-inp" id="gt" inputmode="decimal" placeholder="気温℃" value="${esc(g.temperature||"")}">
      <input class="gear-inp" id="ga" inputmode="decimal" placeholder="標高m" value="${esc(g.altitude||"")}">
      <input class="gear-inp" id="gh" inputmode="decimal" placeholder="湿度%" value="${esc(g.humidity||"")}">
    </div>
    <div class="gear-lbl">サイト目盛り @70m（cm/クリック）</div>
    <div class="gear-grid">
      <input class="gear-inp" id="gcv" inputmode="decimal" placeholder="上下" value="${esc(g.calibV70||"")}">
      <input class="gear-inp" id="gch" inputmode="decimal" placeholder="左右" value="${esc(g.calibH70||"")}">
      <input class="gear-inp full" id="geye" inputmode="decimal" placeholder="アイサイト距離mm（850）" value="${esc(db.settings.eyeSight||850)}">
    </div>`,
    `<button class="btn hit" id="gs">保存</button>`);
  const bb=$("#backBtn");if(bb)bb.onclick=()=>nav("home");
  $("#gs").onclick=()=>{
    const d={id:g.id||uid(),name:$("#gn").value.trim()||"main",bow:$("#gb").value.trim(),
      poundage:$("#gp").value.trim(),drawLength:$("#gd").value.trim(),arrowWeight:$("#gw").value.trim(),
      arrowSpeed:$("#gsp").value.trim(),arrowDia:$("#gdi").value.trim(),temperature:$("#gt").value.trim(),
      altitude:$("#ga").value.trim(),humidity:$("#gh").value.trim(),
      calibV70:$("#gcv").value.trim(),calibH70:$("#gch").value.trim()};
    if(db.setups.length)db.setups[0]=d;else db.setups.push(d);
    const eye=parseFloat($("#geye").value);if(isFinite(eye)&&eye>0)db.settings.eyeSight=eye;
    save();toast("保存した");
  };
}

if("serviceWorker"in navigator&&(location.protocol==="https:"||location.hostname==="localhost")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
function checkUp(){if(location.protocol==="file:")return;fetch("version.json?"+Date.now(),{cache:"no-store"}).then(r=>r.json()).then(j=>{if(j?.v>APP_VER)$("#updBar").style.display="block";}).catch(()=>{});}
$("#updBar").onclick=()=>location.reload();
document.addEventListener("visibilitychange",()=>{if(!document.hidden)checkUp();});
window.onerror=(msg,src,line)=>{toast("ERR:"+line);console.error(msg,src,line);};
blockZoom();checkUp();render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f8f7f4">
<meta name="description" content="Converge — 着弾が、収束する。的の前で記録し、戻れば集まりが見えるアーチェリー練習アプリ。オフライン対応。">
<meta name="keywords" content="アーチェリー,弓道,得点記録,サイト調整,グルーピング,練習帳,PWA">
<meta name="robots" content="index,follow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Converge">
<link rel="canonical" href="https://eita115115.github.io/archery-converge/">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Converge — アーチェリー得点記録 &amp; サイト確認</title>
<style>
:root{
  --void:#f8f7f4;--panel:#ffffff;--line:#e6e4de;--line2:#d8d5cd;
  --text:#1c1b19;--mute:#5c5a54;--dim:#8a877f;
  --hit:#0f766e;--warn:#c2410c;--beat:#dc2626;--sight:#6d28d9;
  --gold:#b45309;--cut-ok:#0f766e;--cut-miss:#b91c1c;--red:#b91c1c;--blue:#1d4ed8;--ink:#0f0f0e;--link:#0066cc;
  --geo-group:#0d9488;--geo-fill:rgba(13,148,136,.12);--geo-center:#ea580c;--geo-axis:#cbd5e1;
  --slot-done:#0f766e;--slot-active:#1c1b19;--slot-idle:#d8d5cd;
  --mark-cur:#0f0f0e;--mark-past:rgba(60,60,60,.45);
  --preview-fill:#1e3a5f;--preview-fine:#c2410c;
  --shadow:0 2px 16px rgba(28,27,25,.07);--shadow-lg:0 8px 32px rgba(28,27,25,.1);
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  --vh:1vh;--app-h:100vh;
  --safe-top:constant(safe-area-inset-top);--safe-top:env(safe-area-inset-top,0px);
  --safe-bot:constant(safe-area-inset-bottom);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;padding:0;overflow-x:hidden;background:var(--void);color:var(--text);touch-action:manipulation;-ms-touch-action:manipulation}
body{font-family:var(--sans);font-size:15px;-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%;text-size-adjust:100%;
  background:linear-gradient(180deg,#faf9f6 0%,#f3f1ec 100%);min-height:100vh}
body.noflow{overflow:hidden;height:calc(var(--vh,1vh)*100);max-height:calc(var(--vh,1vh)*100)}
input,select,textarea{-webkit-user-select:auto;user-select:auto}
button:focus-visible,input:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

.frame{position:relative;min-height:calc(var(--vh,1vh)*100);min-height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%;
  background:var(--panel);box-shadow:var(--shadow-lg)}
.frame.fit{height:calc(var(--vh,1vh)*100);max-height:calc(var(--vh,1vh)*100);min-height:0;overflow:hidden}
@supports (height:100dvh){
  .frame{min-height:100dvh}
  .frame.fit{height:100dvh;max-height:100dvh}
  body.noflow{height:100dvh;max-height:100dvh}
}
.frame.fit .main{flex:1;min-height:0;display:flex;flex-direction:column}
.frame.fit .hdr{padding:calc(4px + var(--safe-top)) 12px 6px;min-height:38px}
.frame.fit .hdr .title{font-size:16px;color:var(--text)}
.frame.fit .body{flex:1;min-height:0;overflow:hidden;padding:0 10px;display:flex;flex-direction:column}
.frame.fit.setup-fit .body{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.frame.fit .foot{flex-shrink:0;padding:8px 12px;padding-bottom:calc(8px + var(--safe-bot))}
.frame.fit .btn{padding:15px 14px;font-size:16px}
.frame.fit .btn.sm{padding:12px 14px;font-size:14px;min-height:48px}
.hdr{display:flex;align-items:center;gap:10px;padding:calc(6px + var(--safe-top)) 16px 10px;min-height:44px}
.hdr .back{background:none;border:none;color:var(--link);font-size:15px;font-weight:400;cursor:pointer;padding:8px 4px;min-width:44px;letter-spacing:-.01em}
.hdr .title{flex:1;text-align:center;font-size:17px;font-weight:600;letter-spacing:-.03em;color:var(--ink)}
.hdr .gap{min-width:44px}

.body{flex:1;padding:0 12px 12px;padding-bottom:calc(12px + var(--safe-bot))}
.body.fill{display:flex;flex-direction:column;min-height:0}
.body.tight{padding:0 6px 8px}

/* distance rings */
.dist-wrap{display:flex;justify-content:center;padding:20px 0 12px}
.frame.fit .dist-wrap{padding:12px 0 8px;flex:0 0 auto;align-items:center}
.dist-svg{width:min(280px,88vw);height:min(280px,88vw);touch-action:manipulation}
.frame.fit .dist-svg{width:min(280px,76vw);height:min(280px,76vw)}
.frame.fit.setup-fit .dist-svg{width:min(300px,82vw);height:min(300px,82vw)}
.dist-svg .ring{cursor:pointer;fill:none;stroke:var(--line2);stroke-width:14;transition:stroke .2s,stroke-width .2s}
.dist-svg .ring.on{stroke:var(--ink);stroke-width:18}
.dist-svg .ring.lab{stroke:none;fill:var(--dim);font-size:11px;text-anchor:middle}
.dist-svg .center{fill:none;stroke:var(--line);stroke-width:1}
.dist-val{text-align:center;font-size:42px;font-weight:700;color:var(--text);line-height:1}
.dist-val small{font-size:16px;color:var(--mute);font-weight:400}

/* sight crosshair setup */
.sight-x{display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:auto auto auto;gap:6px;align-items:center;max-width:300px;margin:16px auto}
.sight-x .ax{font-size:10px;color:var(--dim);text-align:center;letter-spacing:.06em}
.sight-x .core{width:72px;height:72px;position:relative}
.sight-x .core svg{width:100%;height:100%}
.sight-x input{width:100%;padding:12px 8px;border:1px solid var(--line);border-radius:50px;
  background:var(--panel);color:var(--text);font-size:18px;text-align:center}
.frame.fit .sight-x{margin:0;max-width:none}
.frame.fit .sight-x .core{width:68px;height:68px}
.frame.fit .sight-x input{padding:12px 8px;font-size:18px}
.setup-mid{display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;padding:8px 0}
.frame.fit .wind-compass{padding:4px 0}
.frame.fit .wind-compass svg{width:min(168px,44vw);height:min(168px,44vw)}
.frame.fit .wind-spd{margin:6px 0 0;gap:6px}
.frame.fit .wind-spd button{padding:10px 14px;font-size:14px}
.sight-x .v-up{grid-column:2}.sight-x .v-dn{grid-column:2}
.sight-x .h-l{grid-column:1;grid-row:2}.sight-x .h-r{grid-column:3;grid-row:2}
.sight-x .core{grid-column:2;grid-row:2}

.note-inp{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:24px;
  background:var(--panel);color:var(--text);font-size:14px;min-height:44px;resize:none;margin-top:12px}

/* target hero */
.tgt-stage{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;touch-action:none;-ms-touch-action:none}
.frame.fit .tgt-stage{flex:1;width:100%;min-height:0}
.tgt-stage .box{position:relative;width:100%;max-width:min(100vw - 16px, 500px);transform-origin:center center}
.frame.fit .tgt-stage .box.sq-fit{margin:0 auto;flex-shrink:0}
.box.sq-fit{display:flex;align-items:center;justify-content:center}
.tgt-stack{position:relative;width:100%;height:100%}
.tgt-stack svg.face{width:100%;height:100%;display:block;touch-action:none;-ms-touch-action:none;
  border-radius:50%;box-shadow:var(--shadow),0 0 0 1px rgba(0,0,0,.04);transition:box-shadow .25s ease,filter .2s ease}
.tgt-stack svg.face.oppai{box-shadow:0 10px 28px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06)}
.tgt-stack.hit-flash svg.face{animation:tgt-flash .38s ease}
.tgt-stack svg.face.face-reveal{animation:face-reveal .55s cubic-bezier(.2,.85,.25,1)}
@keyframes tgt-flash{0%,100%{filter:none}35%{filter:brightness(1.06)}}
@keyframes face-reveal{0%{opacity:.55;transform:scale(.97)}100%{opacity:1;transform:scale(1)}}
.mark-scored.mark-pop{transform-box:fill-box;transform-origin:center;animation:mark-pop .38s cubic-bezier(.2,.9,.2,1) both}
.mark-scored.mark-pop.mark-ten{animation-duration:.48s}
@keyframes mark-pop{0%{transform:scale(.25);opacity:0}55%{transform:scale(1.18);opacity:1}100%{transform:scale(1);opacity:.92}}
.rec-progress .dot.bump{animation:dot-bump .38s cubic-bezier(.2,.9,.2,1)}
@keyframes dot-bump{0%{transform:scale(1)}45%{transform:scale(1.45)}100%{transform:scale(1)}}
.btn.hero.ready-pulse{animation:ready-pulse .55s cubic-bezier(.2,.9,.2,1)}
@keyframes ready-pulse{0%,100%{transform:scale(1)}40%{transform:scale(1.03)}}
.tgt-stack .lens{position:absolute}
.tgt-stack .geo-nums{position:absolute;bottom:6px;right:6px}

.lens{top:6px;width:120px;height:120px;border-radius:50%;border:2px solid var(--hit);
  background:#fff;display:none;pointer-events:none;overflow:hidden;box-shadow:var(--shadow-lg)}
.lens.fine{border-color:var(--warn)}
.lens.fine.cut{border-color:var(--cut-ok)}
.lens.fine.miss{border-color:var(--cut-miss)}

.geo-nums{display:flex;gap:8px;font-size:12px;color:var(--dim);pointer-events:none}
.geo-nums b{color:var(--mute);font-weight:600}

.zoom-bar{flex-shrink:0;display:flex;justify-content:flex-end;padding:0 2px 4px}
.zoom-chips{display:flex;gap:6px;flex-wrap:wrap}
.zoom-chip{padding:6px 12px;border-radius:999px;border:1.5px solid var(--line2);background:var(--panel);
  color:var(--mute);font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation}
.zoom-chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.frame.fit .zoom-bar{padding:0 0 3px}
.frame.fit .zoom-chip{padding:5px 11px;font-size:12px}

.rec-progress{flex-shrink:0;display:flex;justify-content:center;gap:7px;padding:4px 0 2px}
.rec-progress .dot{width:9px;height:9px;border-radius:50%;background:var(--slot-idle);opacity:.45}
.rec-progress .dot.on{background:var(--ink);opacity:.35}
.rec-progress .dot.cur{background:var(--ink);opacity:1;box-shadow:0 0 0 2px rgba(15,15,14,.12)}
.frame.fit .rec-progress{padding:3px 0 0;gap:6px}
.frame.fit .rec-progress .dot{width:8px;height:8px}

.geo-legend{flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;
  padding:8px 6px 4px;border-top:1px solid var(--line);margin-top:4px}
.geo-legend .gl{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mute);white-space:nowrap}
.geo-legend .gl svg{width:26px;height:26px;flex-shrink:0;display:block}
.frame.fit .geo-legend{padding:6px 4px 2px;gap:10px}
.frame.fit .geo-legend .gl{font-size:12px}
.frame.fit .geo-legend .gl svg{width:24px;height:24px}

/* return: grouping + sight dial */
.ret-geo{display:flex;flex-direction:column;align-items:center;gap:8px}
.ret-split{flex:1;min-height:0;display:flex;flex-direction:row;align-items:stretch;width:100%}
.ret-split .cell{flex:1;min-height:0;min-width:0;display:flex;align-items:center;justify-content:center;padding:0 2px}
.ret-split .cell+.cell{margin-left:4px}
.ret-split .cell .box.sq-fit{margin:0 auto}
@media (max-width:360px),(max-height:580px){
  .frame.fit .ret-split{flex-direction:column}
  .frame.fit .ret-split .cell+.cell{margin-left:0;margin-top:4px}
  .frame.fit .ret-split .cell{flex:1 1 0}
}
.ret-split .sight-dial{width:100%;max-width:100%;margin:0}
.ret-bar{flex-shrink:0;text-align:center;font-size:13px;color:var(--dim);line-height:1.4;padding:4px 6px 2px}
.ret-bar b{color:var(--mute);font-weight:600}
.ret-geo .mini{width:min(240px,70vw)}
.ret-geo .mini .box{transform:scale(1)}

.sight-dial{width:min(280px,88vw);margin:8px auto}
.frame.fit .sight-dial svg{max-height:none}
.sight-dial svg{width:100%;display:block}
.sight-dial .tick{stroke:var(--line2);stroke-width:1}
.sight-dial .axis{stroke:var(--line);stroke-width:1.5;opacity:.6}
.sight-dial .start{fill:var(--dim)}
.sight-dial .now{fill:var(--sight);stroke:#fff;stroke-width:2}
.sight-dial .sug{stroke:var(--warn);stroke-width:2.5;marker-end:url(#arr)}
.sight-dial .lbl{font-size:9px;fill:var(--dim)}
.sight-dial input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.sight-adj{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.sight-adj input{padding:12px;border:1px solid var(--line);border-radius:50px;background:var(--panel);color:var(--text);font-size:17px;text-align:center;width:100%}

.end-badge{text-align:center;padding:6px 0}
.end-badge .n{font-size:clamp(3rem,14vw,4rem);font-weight:700;letter-spacing:-.04em;color:var(--ink);line-height:1}
.end-badge .s{font-size:14px;color:var(--mute);margin-top:10px;letter-spacing:-.01em}
.hdr .jtag{font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px}
.hdr .jtag.ok{background:rgba(15,118,110,.12);color:var(--hit)}
.hdr .jtag.mid{background:rgba(194,65,12,.1);color:var(--warn)}
.hdr .jtag.hold{background:rgba(109,40,217,.1);color:var(--sight)}
.hdr .jtag.warn{background:rgba(220,38,38,.1);color:var(--beat)}
.frame.fit .foot .row3{display:flex;flex-direction:row;align-items:stretch}
.frame.fit .foot .row3 .btn{flex:1;min-width:0;margin-top:0;padding:13px 6px;font-size:14px}
.frame.fit .foot .row3 .btn+.btn{margin-left:6px}
.frame.fit .foot .row3 .btn:nth-child(2){flex:1.15}

.btn{
  display:block;width:100%;padding:16px;border-radius:980px;border:none;
  font-size:16px;font-weight:600;cursor:pointer;font-family:var(--sans);letter-spacing:-.02em;
  transition:transform .15s ease,opacity .15s ease;
}
.btn:active{transform:scale(.98);opacity:.88}
.btn.hit{background:var(--ink);color:#fff;box-shadow:none}
.btn.beat{background:var(--ink);color:#fff;box-shadow:none}
.btn.ghost{background:transparent;color:var(--mute);border:1px solid var(--line2)}
.btn.sm{padding:10px 16px;font-size:13px;width:auto;border-radius:980px}
.btn:disabled{opacity:.3}
.foot{padding:8px 12px 0;padding-bottom:calc(8px + var(--safe-bot))}
.foot .row{display:flex;flex-direction:row}.foot .row .btn{flex:1;min-width:0}
.foot .row .btn+.btn{margin-left:8px}
.foot .gap-btn{flex:1;min-width:0}
.foot-undo{padding:0 0 8px}
.foot-undo .reopen-btn{width:100%;padding:12px 14px;font-size:14px;border-style:dashed}
.frame.fit .foot-undo{padding:0 0 6px}
.frame.fit .foot-undo .reopen-btn{padding:11px 12px;font-size:13px}

.frame.app-mode,.frame.home-mode{background:var(--void);box-shadow:none;max-width:100%}
.frame.app-mode .body{padding:0 20px 16px}
.frame.app-mode .foot{padding-left:20px;padding-right:20px}
.frame.app-mode .hdr{padding-left:12px;padding-right:12px}

.frame.app-mode.fit .body{padding:0 10px}
.frame.app-mode.fit .foot{padding-left:12px;padding-right:12px}
.frame.home-mode .body{padding:0;flex:1;display:flex;flex-direction:column}
.app-page{padding:8px 0 12px}
.app-page-tight{padding:4px 0 8px}
.home-wrap{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:calc(28px + var(--safe-top)) 28px calc(24px + var(--safe-bot));min-height:calc(var(--vh,1vh)*100);min-height:100dvh}
.home-hero{display:flex;flex-direction:column;align-items:center;width:100%}
.home-visual{width:min(200px,54vw);aspect-ratio:1;margin:0 0 28px;filter:drop-shadow(0 24px 48px rgba(28,27,25,.12))}
.home-visual svg{width:100%;height:100%;display:block}
.home-eyebrow{margin:0 0 10px;font-size:11px;font-weight:600;letter-spacing:.18em;color:var(--dim)}
.home-title{margin:0;font-size:clamp(2.25rem,10vw,3rem);font-weight:700;letter-spacing:-.05em;line-height:1.02;color:var(--ink)}
.home-tag{margin:18px 0 0;max-width:19em;font-size:1.0625rem;font-weight:400;line-height:1.5;color:var(--mute);letter-spacing:-.01em}
.home-steps{}
.home-flow{display:flex;align-items:center;justify-content:center;gap:0;width:100%;max-width:360px;margin:36px 0 8px;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.home-flow .flow-item{flex:1;min-width:0;padding:0 4px}
.home-flow .flow-k{display:block;font-size:13px;font-weight:600;letter-spacing:-.02em;color:var(--text)}
.home-flow .flow-v{display:block;margin-top:5px;font-size:11px;color:var(--dim);letter-spacing:.01em}
.home-flow .flow-dot{width:3px;height:3px;border-radius:50%;background:var(--line2);flex-shrink:0}
.home-prev{margin:20px 0 0;font-size:13px;color:var(--dim);letter-spacing:-.01em}
.home-prev b{color:var(--text);font-weight:600}
.btn.hero{display:block;width:100%;max-width:320px;margin:28px auto 0;padding:17px 24px;border-radius:980px;border:none;
  background:var(--ink);color:#fff;font-size:17px;font-weight:600;letter-spacing:-.02em;cursor:pointer;font-family:var(--sans);
  transition:transform .15s ease,opacity .15s ease}
.btn.hero:active{transform:scale(.98);opacity:.88}
.foot .btn.hero,.frame.fit .foot .btn.hero,.app-page .btn.hero{max-width:none;margin:0}
.end-hero{text-align:center;padding:calc(16px + var(--safe-top)) 0 8px}
.end-hero .eyebrow{margin:0 0 8px;font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--dim)}
.end-hero .headline{margin:0;font-size:clamp(1.75rem,8vw,2.25rem);font-weight:700;letter-spacing:-.04em;color:var(--ink)}
.home-foot{margin-top:auto;padding-top:32px;width:100%}
.home-foot-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 22px}
.home-foot-nav button{background:none;border:none;padding:6px 2px;font-size:12px;color:var(--dim);cursor:pointer;letter-spacing:-.01em}
.home-foot-nav button:hover{color:var(--mute)}
.rec-hint{text-align:center;font-size:12px;color:var(--dim);margin:6px 0 0;line-height:1.4}
.trust-line{font-size:12px;color:var(--dim);text-align:center;line-height:1.5;padding:8px 6px 4px;letter-spacing:-.01em}
.trust-line .trust-link{background:none;border:none;padding:0;font:inherit;font-size:inherit;color:var(--link);cursor:pointer;text-decoration:underline;letter-spacing:-.01em}
.advice-foot{font-size:11px;color:var(--dim);text-align:center;margin:10px 0 4px;line-height:1.45;padding:0 8px}
.advice-note.dim{color:var(--dim);margin-top:10px}
.end-badge .s.cmp{color:var(--ink);margin-top:8px;font-weight:500}
.row .undo-btn{font-weight:600}
.updbar{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(12px + var(--safe-bot));z-index:70;
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:980px;font-size:12px;font-weight:600;cursor:pointer;display:none;box-shadow:var(--shadow-lg);white-space:nowrap}

.hist-row{display:flex;justify-content:space-between;align-items:center;padding:16px 2px;border-bottom:1px solid var(--line);cursor:pointer;letter-spacing:-.01em}
.hist-row .d{font-size:16px;font-weight:500;color:var(--text)}
.hist-row .m{font-size:13px;color:var(--dim);margin-top:3px}
.hist-row .pts{font-size:24px;font-weight:700;letter-spacing:-.03em;color:var(--ink)}

.gear-inp{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:14px;background:var(--panel);color:var(--text);font-size:16px;margin-bottom:10px;letter-spacing:-.01em}
.gear-lbl{font-size:12px;font-weight:500;color:var(--dim);margin:14px 0 6px;letter-spacing:-.01em}

.pulse{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;background:rgba(248,247,244,.88)}
.pulse.on{opacity:1;pointer-events:auto}
.pulse.zenkin svg circle{stroke:#e89098;opacity:.65}
.pulse.zenkin .val{font-size:34px;fill:#c04858}
.pulse svg{width:160px;height:160px}
.pulse .val{font-size:40px;font-weight:700;fill:var(--warn)}

.toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%);z-index:80;
  background:var(--text);color:#fff;padding:10px 18px;border-radius:24px;
  font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}

.wind-compass .wbtn.on{fill:var(--ink)}
.wind-compass .wlbl{font-size:9px;fill:var(--dim);text-anchor:middle;pointer-events:none}
.wind-compass .wlbl.on{fill:var(--text);font-weight:600}

.phys-badge.mid{background:rgba(232,176,64,.12);color:var(--warn)}
.phys-badge.hold{background:rgba(155,124,240,.1);color:var(--sight)}
.phys-badge.warn{background:rgba(224,96,80,.1);color:var(--beat)}

}
@media (max-width:320px){

.gear-sep{height:1px;background:var(--line);margin:14px 0}

.coach-card{display:flex;gap:12px;align-items:flex-start;text-align:left;background:transparent;border:none;
  border-radius:0;padding:12px 2px 14px;margin:0 0 4px;max-width:100%;border-bottom:1px solid var(--line)}
.coach-card .coach-ico{flex-shrink:0;width:32px;height:32px;border-radius:8px;background:rgba(15,15,14,.06);
  color:var(--ink);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1.1}
.coach-card .coach-body b{display:block;font-size:14px;color:var(--text);margin-bottom:4px}
.coach-card .coach-body p{margin:0;font-size:13px;color:var(--dim);line-height:1.55}


.static-landing{padding:24px 16px 32px;max-width:520px;margin:0 auto;line-height:1.6}
.static-landing h1{font-size:1.5rem;margin:0 0 .5rem}
.static-landing p,.static-landing li{color:var(--mute);font-size:.95rem}
.static-landing ol{padding-left:1.25rem;margin:1rem 0}
.static-landing a{color:var(--hit)}

.field-hint{font-size:12px;color:var(--dim);text-align:center;margin:4px 0 0;line-height:1.45}
.field-hint:empty{display:none}
.sight-x .sight-lbl{grid-column:1/4;margin-bottom:2px}
.sight-x .field-hint.full{grid-column:1/4;margin-top:4px}

.advice-card{flex-shrink:0;background:transparent;border:none;border-radius:0;
  padding:12px 2px 14px;margin:0 0 6px;line-height:1.5;border-bottom:1px solid var(--line)}
.advice-card .advice-title{font-size:15px;font-weight:700;color:var(--warn);margin-bottom:6px}
.advice-card.tone-ok .advice-title{color:var(--hit)}
.advice-card.tone-hold .advice-title{color:var(--sight)}
.advice-card.tone-warn .advice-title{color:var(--beat)}
.advice-card .advice-group{font-size:13px;color:var(--mute);margin-bottom:8px}
.advice-card .advice-group b{color:var(--text)}
.advice-card .advice-move{font-size:13px;color:var(--text);padding:6px 0;border-top:1px solid var(--line)}
.advice-card .advice-note{font-size:12px;color:var(--dim);margin-top:8px}

.geo-plain{position:absolute;bottom:6px;left:6px;right:6px;text-align:center;font-size:12px;color:var(--text);
  background:rgba(255,255,255,.92);border-radius:10px;padding:5px 10px;pointer-events:none;line-height:1.35;
  box-shadow:var(--shadow);border:1px solid var(--line)}

.beg-toggle{margin:4px 0 16px;padding:14px 16px;background:var(--panel);border:1px solid var(--line);border-radius:14px}
.beg-lbl{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);cursor:pointer}
.beg-lbl input{width:18px;height:18px;accent-color:var(--ink)}
</style>

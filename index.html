<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#121412">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Converge">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Converge</title>
<style>
:root{
  --void:#121412;--panel:#1a1c18;--line:#2a2c26;--line2:#383a32;
  --text:#e8e6dc;--mute:#8a8878;--dim:#5c5a4e;
  --hit:#5ecf7a;--warn:#e8b040;--beat:#e06050;--sight:#9b7cf0;
  --gold:#d4a72c;--red:#c73e3a;--blue:#3d8fd4;--ink:#161614;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  --vh:1vh;--app-h:100vh;
  --safe-top:constant(safe-area-inset-top);--safe-top:env(safe-area-inset-top,0px);
  --safe-bot:constant(safe-area-inset-bottom);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;padding:0;overflow-x:hidden;background:var(--void);color:var(--text);touch-action:manipulation;-ms-touch-action:manipulation}
body{font-family:var(--sans);font-size:15px;-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%;text-size-adjust:100%}
body.noflow{overflow:hidden;height:calc(var(--vh,1vh)*100);max-height:calc(var(--vh,1vh)*100)}
input,select,textarea{-webkit-user-select:auto;user-select:auto}
button:focus-visible,input:focus-visible{outline:2px solid var(--hit);outline-offset:2px}

.frame{position:relative;min-height:calc(var(--vh,1vh)*100);min-height:100vh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;width:100%}
.frame.fit{height:calc(var(--vh,1vh)*100);max-height:calc(var(--vh,1vh)*100);min-height:0;overflow:hidden}
@supports (height:100dvh){
  .frame{min-height:100dvh}
  .frame.fit{height:100dvh;max-height:100dvh}
  body.noflow{height:100dvh;max-height:100dvh}
}
.frame.fit .main{flex:1;min-height:0;display:flex;flex-direction:column}
.frame.fit .phase-arc{padding:6px 12px 0;padding-top:calc(6px + var(--safe-top))}
.frame.fit .phase-arc svg{height:34px}
.frame.fit .hdr{padding:2px 12px 6px;min-height:38px}
.frame.fit .hdr .title{font-size:16px;color:var(--text)}
.frame.fit .body{flex:1;min-height:0;overflow:hidden;padding:0 10px;display:flex;flex-direction:column}
.frame.fit.setup-fit .body{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.frame.fit .foot{flex-shrink:0;padding:8px 12px;padding-bottom:calc(8px + var(--safe-bot))}
.frame.fit .btn{padding:15px 14px;font-size:16px}
.frame.fit .btn.sm{padding:12px 14px;font-size:14px;min-height:48px}
.phase-arc{flex-shrink:0;padding:8px 12px 4px;padding-top:calc(8px + var(--safe-top))}
.phase-arc svg{display:block;width:100%;height:36px}
.phase-arc .lbl{font-size:11px;fill:var(--dim)}
.phase-arc .lbl.on{fill:var(--text);font-weight:600}
.phase-arc .seg{fill:none;stroke:var(--line);stroke-width:6;stroke-linecap:round}
.phase-arc .seg.on{stroke:var(--hit)}
.phase-arc .seg.cur{stroke:var(--warn)}

.hdr{display:flex;align-items:center;gap:10px;padding:4px 14px 8px;min-height:40px}
.hdr .back{background:none;border:none;color:var(--mute);font-size:13px;cursor:pointer;padding:8px 4px;min-width:44px}
.hdr .title{flex:1;text-align:center;font-size:13px;color:var(--mute)}
.hdr .gap{min-width:44px}

.body{flex:1;padding:0 12px 12px;padding-bottom:calc(12px + var(--safe-bot))}
.body.fill{display:flex;flex-direction:column;min-height:0}
.body.tight{padding:0 6px 8px}

/* distance rings */
.dist-wrap{display:flex;justify-content:center;padding:20px 0 12px}
.frame.fit .dist-wrap{padding:12px 0 8px;flex:0 0 auto;align-items:center}
.dist-svg{width:min(280px,88vw);height:min(280px,88vw);touch-action:manipulation}
.frame.fit .dist-svg{width:min(280px,76vw);height:min(280px,76vw)}
.frame.fit.setup-fit .dist-svg{width:min(300px,82vw);height:min(300px,82vw)}
.dist-svg .ring{cursor:pointer;fill:none;stroke:var(--line2);stroke-width:14;transition:stroke .2s,stroke-width .2s}
.dist-svg .ring.on{stroke:var(--hit);stroke-width:18}
.dist-svg .ring.lab{stroke:none;fill:var(--dim);font-size:11px;text-anchor:middle}
.dist-svg .center{fill:none;stroke:var(--line);stroke-width:1}
.dist-val{text-align:center;font-size:42px;font-weight:700;color:var(--text);line-height:1}
.dist-val small{font-size:16px;color:var(--mute);font-weight:400}

/* sight crosshair setup */
.sight-x{display:grid;grid-template-columns:1fr auto 1fr;grid-template-rows:auto auto auto;gap:6px;align-items:center;max-width:300px;margin:16px auto}
.sight-x .ax{font-size:10px;color:var(--dim);text-align:center;letter-spacing:.06em}
.sight-x .core{width:72px;height:72px;position:relative}
.sight-x .core svg{width:100%;height:100%}
.sight-x input{width:100%;padding:12px 8px;border:1px solid var(--line);border-radius:50px;
  background:var(--panel);color:var(--text);font-size:18px;text-align:center}
.frame.fit .sight-x{margin:0;max-width:none}
.frame.fit .sight-x .core{width:68px;height:68px}
.frame.fit .sight-x input{padding:12px 8px;font-size:18px}
.setup-mid{display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0;padding:8px 0}
.frame.fit .wind-compass{padding:4px 0}
.frame.fit .wind-compass svg{width:min(168px,44vw);height:min(168px,44vw)}
.frame.fit .wind-spd{margin:6px 0 0;gap:6px}
.frame.fit .wind-spd button{padding:10px 14px;font-size:14px}
.sight-x .v-up{grid-column:2}.sight-x .v-dn{grid-column:2}
.sight-x .h-l{grid-column:1;grid-row:2}.sight-x .h-r{grid-column:3;grid-row:2}
.sight-x .core{grid-column:2;grid-row:2}

.note-inp{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:24px;
  background:var(--panel);color:var(--text);font-size:14px;min-height:44px;resize:none;margin-top:12px}

/* target hero */
.tgt-stage{position:relative;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;touch-action:none;-ms-touch-action:none}
.frame.fit .tgt-stage{flex:1;width:100%;min-height:0}
.tgt-stage .box{position:relative;width:100%;max-width:min(100vw - 16px, 500px);transform-origin:center center}
.frame.fit .tgt-stage .box.sq-fit{margin:0 auto;flex-shrink:0}
.box.sq-fit{display:flex;align-items:center;justify-content:center}
.tgt-stack{position:relative;width:100%;height:100%}
.tgt-stack svg.face{width:100%;height:100%;display:block;touch-action:none;-ms-touch-action:none}
.tgt-stack .lens{position:absolute}
.tgt-stack .geo-nums{position:absolute;bottom:6px;right:6px}

.lens{top:6px;width:120px;height:120px;border-radius:50%;border:2px solid var(--hit);
  background:#222420;display:none;pointer-events:none;overflow:hidden;box-shadow:0 0 16px rgba(0,0,0,.5)}
.lens.fine{border-color:var(--warn)}.lens.cut{border-color:var(--hit)}

.geo-nums{display:flex;gap:8px;font-size:12px;color:var(--dim);pointer-events:none}
.geo-nums b{color:var(--mute);font-weight:600}

.geo-legend{flex-shrink:0;display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;
  padding:8px 6px 4px;border-top:1px solid var(--line);margin-top:4px}
.geo-legend .gl{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mute);white-space:nowrap}
.geo-legend .gl svg{width:26px;height:26px;flex-shrink:0;display:block}
.frame.fit .geo-legend{padding:6px 4px 2px;gap:10px}
.frame.fit .geo-legend .gl{font-size:12px}
.frame.fit .geo-legend .gl svg{width:24px;height:24px}

/* return: grouping + sight dial */
.ret-geo{display:flex;flex-direction:column;align-items:center;gap:8px}
.ret-split{flex:1;min-height:0;display:flex;flex-direction:row;align-items:stretch;width:100%}
.ret-split .cell{flex:1;min-height:0;min-width:0;display:flex;align-items:center;justify-content:center;padding:0 2px}
.ret-split .cell+.cell{margin-left:4px}
.ret-split .cell .box.sq-fit{margin:0 auto}
@media (max-width:360px),(max-height:580px){
  .frame.fit .ret-split{flex-direction:column}
  .frame.fit .ret-split .cell+.cell{margin-left:0;margin-top:4px}
  .frame.fit .ret-split .cell{flex:1 1 0}
}
.ret-split .sight-dial{width:100%;max-width:100%;margin:0}
.ret-bar{flex-shrink:0;text-align:center;font-size:13px;color:var(--dim);line-height:1.4;padding:4px 6px 2px}
.ret-bar b{color:var(--mute);font-weight:600}
.ret-geo .mini{width:min(240px,70vw)}
.ret-geo .mini .box{transform:scale(1)}

.sight-dial{width:min(280px,88vw);margin:8px auto}
.frame.fit .sight-dial svg{max-height:none}
.sight-dial svg{width:100%;display:block}
.sight-dial .tick{stroke:var(--line2);stroke-width:1}
.sight-dial .axis{stroke:var(--line);stroke-width:1.5;opacity:.6}
.sight-dial .start{fill:var(--dim)}
.sight-dial .now{fill:var(--sight);stroke:#fff;stroke-width:1.5}
.sight-dial .sug{stroke:var(--warn);stroke-width:2.5;marker-end:url(#arr)}
.sight-dial .lbl{font-size:9px;fill:var(--dim)}
.sight-dial input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}
.sight-adj{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.sight-adj input{padding:12px;border:1px solid var(--line);border-radius:50px;background:var(--panel);color:var(--text);font-size:17px;text-align:center;width:100%}

.end-badge{text-align:center;padding:6px 0}
.end-badge .n{font-size:32px;font-weight:700;color:var(--warn)}
.end-badge .s{font-size:12px;color:var(--dim);margin-top:2px}
.hdr .jtag{font-size:12px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:4px}
.hdr .jtag.ok{background:rgba(94,207,122,.15);color:var(--hit)}
.hdr .jtag.mid{background:rgba(232,176,64,.15);color:var(--warn)}
.hdr .jtag.hold{background:rgba(155,124,240,.12);color:var(--sight)}
.hdr .jtag.warn{background:rgba(224,96,80,.12);color:var(--beat)}
.frame.fit .foot .row3{display:flex;flex-direction:row;align-items:stretch}
.frame.fit .foot .row3 .btn{flex:1;min-width:0;margin-top:0;padding:13px 6px;font-size:14px}
.frame.fit .foot .row3 .btn+.btn{margin-left:6px}
.frame.fit .foot .row3 .btn:nth-child(2){flex:1.15}

.btn{
  display:block;width:100%;padding:16px;border-radius:50px;border:none;
  font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);
}
.btn.hit{background:var(--hit);color:var(--void)}
.btn.beat{background:var(--beat);color:#fff}
.btn.ghost{background:transparent;color:var(--mute);border:1px solid var(--line)}
.btn.sm{padding:10px 16px;font-size:13px;width:auto;border-radius:24px}
.btn:disabled{opacity:.3}
.foot{padding:8px 12px 0;padding-bottom:calc(8px + var(--safe-bot))}
.foot .row{display:flex;flex-direction:row}.foot .row .btn{flex:1;min-width:0}
.foot .row .btn+.btn{margin-left:8px}

.home-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(var(--vh,1vh)*100 - 80px);text-align:center;padding:20px}
.home-rings{width:120px;height:120px;margin-bottom:24px}
.home-rings svg{width:100%;height:100%}
.home-wrap p{margin:12px 0 0;font-size:13px;color:var(--dim);line-height:1.6}
.home-links{display:flex;gap:20px;margin-top:24px}
.home-links button{background:none;border:none;color:var(--mute);font-size:13px;cursor:pointer;text-decoration:underline;padding:8px}

.hist-row{display:flex;justify-content:space-between;align-items:center;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.hist-row .d{font-size:15px}
.hist-row .m{font-size:12px;color:var(--dim);margin-top:2px}
.hist-row .pts{font-size:22px;font-weight:700;color:var(--hit)}

.gear-inp{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--panel);color:var(--text);font-size:16px;margin-bottom:10px}
.gear-lbl{font-size:11px;color:var(--dim);margin:12px 0 4px}

.pulse{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;background:rgba(18,20,18,.85)}
.pulse.on{opacity:1;pointer-events:auto}
.pulse svg{width:160px;height:160px}
.pulse .val{font-size:40px;font-weight:700;fill:var(--warn)}

.toast{position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%);z-index:80;
  background:var(--panel);border:1px solid var(--line);padding:8px 16px;border-radius:24px;
  font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.updbar{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:70;
  background:var(--hit);color:var(--void);padding:8px 16px;border-radius:24px;font-size:12px;font-weight:700;cursor:pointer;display:none}
.empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:14px}

.wind-compass{display:flex;justify-content:center;padding:8px 0 4px}
.wind-compass svg{width:min(200px,62vw);height:min(200px,62vw);touch-action:manipulation}
.wind-compass .wbtn{cursor:pointer;fill:var(--line);stroke:none;transition:fill .2s}
.wind-compass .wbtn.on{fill:var(--hit)}
.wind-compass .wlbl{font-size:9px;fill:var(--dim);text-anchor:middle;pointer-events:none}
.wind-compass .wlbl.on{fill:var(--text);font-weight:600}
.wind-spd{display:flex;gap:6px;justify-content:center;margin:6px 0 4px}
.wind-spd button{padding:8px 14px;border:1px solid var(--line);border-radius:20px;background:var(--panel);color:var(--mute);font-size:13px;cursor:pointer}
.wind-spd button.on{border-color:var(--hit);color:var(--hit)}

.phys-badge{text-align:center;padding:6px 12px;margin:4px auto;max-width:300px;border-radius:20px;font-size:13px;font-weight:600}
.phys-badge.ok{background:rgba(94,207,122,.12);color:var(--hit)}
.phys-badge.mid{background:rgba(232,176,64,.12);color:var(--warn)}
.phys-badge.hold{background:rgba(155,124,240,.1);color:var(--sight)}
.phys-badge.warn{background:rgba(224,96,80,.1);color:var(--beat)}
.phys-hint{text-align:center;font-size:11px;color:var(--dim);line-height:1.5;padding:0 12px;margin:4px 0}
.phys-traj{text-align:center;font-size:10px;color:var(--dim);padding:2px 8px}

.gear-grid{display:flex;flex-wrap:wrap;margin:-4px}
.gear-grid>*{flex:1 1 calc(50% - 8px);min-width:128px;max-width:100%;margin:4px;box-sizing:border-box}
.gear-grid .full{flex-basis:100%}
@supports (display:grid){
  .gear-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0}
  .gear-grid>*{min-width:0;margin:0}
}
@media (max-width:320px){
  .gear-grid>*{flex-basis:100%}
  .frame.fit .setup-mid{flex-direction:column}
  .frame.fit .wind-compass svg{width:96px;height:96px}
}
@media (max-height:480px){
  .frame.fit .phase-arc svg{height:28px}
  .frame.fit .hdr{min-height:32px}
  .frame.fit .btn{padding:12px 10px;font-size:15px}
}
.gear-sep{height:1px;background:var(--line);margin:14px 0}
</style>
</head>
<body>
<div class="pulse" id="pulse"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="var(--hit)" stroke-width="3" opacity=".4"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="var(--warn)" stroke-width="2" opacity=".6"/>
  <text x="50" y="54" class="val" id="pulseN" text-anchor="middle">—</text></svg></div>
<div class="frame" id="frame"></div>
<div class="updbar" id="updBar">更新あり</div>
<div class="toast" id="toast"></div>

<script src="compat.js"></script>
<script src="physics.js"></script>
<script src="geometry.js"></script>
<script src="app.js"></script>
<script>
if(window.ConvergeApp)ConvergeApp.init();
else console.error("ConvergeApp missing");
</script>
</body>
</html>

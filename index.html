<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#141614">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Converge">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Converge</title>
<style>
:root{
  --void:#141614;--panel:#1e1e1a;--line:#2e2e28;--line2:#3a3a32;
  --text:#e6e4dc;--mute:#8a8878;--dim:#5a5848;
  --hit:#4ade80;--warn:#f0b840;--beat:#e85d4c;--sight:#a78bfa;
  --gold:#d4a72c;--red:#c73e3a;--blue:#3d8fd4;--ink:#1a1a18;
  --mono:"SF Mono","Cascadia Mono",Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overflow-x:hidden;background:var(--void);color:var(--text)}
body{font-family:var(--sans);font-size:14px;-webkit-user-select:none;user-select:none}
input,select,textarea{-webkit-user-select:auto;user-select:auto}
button:focus-visible,input:focus-visible{outline:2px solid var(--hit);outline-offset:2px}

.top{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));
  border-bottom:1px solid var(--line);min-height:48px;
}
.top h1{margin:0;font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.06em;color:var(--mute)}
.top .phase{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text)}
.top .phase small{font-size:12px;color:var(--mute);font-weight:400;margin-left:6px}
.top button{background:none;border:none;color:var(--mute);font-size:12px;cursor:pointer;padding:6px 8px}

.stage{max-width:520px;margin:0 auto;padding:12px 14px 20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));transition:padding .35s ease}
.stage.tight{padding:6px 8px 14px}
.stage.tighter{padding:2px 6px 10px}

/* B: beat bar */
.beats{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px}
.beat{height:32px;border-radius:4px;background:var(--line);position:relative;overflow:hidden;transition:transform .2s}
.beat.on{background:var(--beat);transform:scaleY(1.06)}
.beat.on.hi{background:var(--warn)}
.beat.cur{box-shadow:0 0 0 2px var(--text)}
.beat span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700}

/* target */
.tg-box{position:relative;touch-action:none;transition:transform .4s cubic-bezier(.2,.8,.2,1);transform-origin:center}
.tg-box svg.face{width:100%;display:block;touch-action:none;border-radius:50%}
.tg-geo{position:absolute;inset:0;pointer-events:none}
.tg-geo svg{width:100%;height:100%;display:block}
.lens{position:absolute;top:6px;width:116px;height:116px;border-radius:50%;border:2px solid var(--hit);
  background:#2a2a26;display:none;pointer-events:none;overflow:hidden;box-shadow:0 0 20px rgba(0,0,0,.45)}
.lens.fine{border-color:var(--warn)}.lens.cut{border-color:var(--hit)}

/* A: drift nums */
.drift{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0;font-family:var(--mono);text-align:center}
.drift div{padding:8px 4px;border:1px solid var(--line);border-radius:6px;background:var(--panel)}
.drift .k{font-size:9px;color:var(--dim);letter-spacing:.08em;margin-bottom:2px}
.drift b{font-size:15px}

.sight-diff{
  border:1px solid var(--line);border-radius:8px;padding:12px;background:var(--panel);margin:10px 0;
  font-family:var(--mono);
}
.sight-diff .row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.sight-diff .row .chg{color:var(--sight)}
.sight-diff .note{font-size:11px;color:var(--dim);margin-top:8px;border-top:1px solid var(--line);padding-top:8px}

.inp,select.inp,textarea.inp{
  width:100%;padding:10px;border:1px solid var(--line);border-radius:6px;
  background:var(--panel);color:var(--text);font-size:16px;
}
textarea.inp{min-height:52px;font-size:14px;resize:vertical}
label.f{display:block;font-size:10px;color:var(--dim);letter-spacing:.08em;margin:10px 0 4px}
.row{display:flex;gap:8px}.row>*{flex:1}

.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 14px;border:1px solid var(--line);border-radius:6px;background:var(--panel);cursor:pointer;font-family:var(--mono)}
.chip.on{border-color:var(--hit);color:var(--hit);background:rgba(74,222,128,.08)}

.btn{
  display:block;width:100%;padding:14px;border-radius:8px;border:none;
  font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);
}
.btn.hit{background:var(--hit);color:var(--void)}
.btn.beat{background:var(--beat);color:#fff}
.btn.ghost{background:var(--panel);color:var(--mute);border:1px solid var(--line);margin-top:8px}
.btn.sm{display:inline-block;width:auto;padding:8px 12px;font-size:12px}
.btn:disabled{opacity:.35}
.act{display:flex;gap:8px;margin-top:10px}.act .btn{flex:1;margin-top:0}

.home-hero{text-align:center;padding:28px 0 20px}
.home-hero .mark{width:72px;height:72px;margin:0 auto 16px;border-radius:50%;
  border:2px solid var(--line);display:flex;align-items:center;justify-content:center}
.home-hero .mark svg{width:56px;height:56px}
.home-hero p{margin:8px 0 0;font-size:12px;color:var(--dim);line-height:1.55}
.home-links{display:flex;justify-content:center;gap:16px;margin-top:20px}
.home-links button{background:none;border:none;color:var(--mute);font-size:12px;cursor:pointer;text-decoration:underline}

.end-sum{font-family:var(--mono);text-align:center;margin:8px 0}
.end-sum b{font-size:28px;color:var(--warn)}
.end-sum span{font-size:12px;color:var(--dim);margin-left:8px}

.s-row{display:flex;justify-content:space-between;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.s-row .d{font-family:var(--mono);font-size:14px}
.s-row .m{font-size:11px;color:var(--dim);margin-top:2px}
.s-row .pts{font-family:var(--mono);font-size:20px;color:var(--hit)}

.breath{position:fixed;inset:0;z-index:90;background:rgba(20,22,20,.88);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  opacity:0;pointer-events:none;transition:opacity .28s}
.breath.on{opacity:1;pointer-events:auto}
.breath b{font-family:var(--mono);font-size:48px;color:var(--warn)}
.breath span{font-size:11px;color:var(--dim);letter-spacing:.15em;margin-top:6px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:80;
  background:var(--panel);border:1px solid var(--line);padding:7px 14px;border-radius:6px;
  font-family:var(--mono);font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.updbar{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:70;
  background:var(--hit);color:var(--void);padding:8px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;display:none}
.empty{text-align:center;padding:32px;color:var(--dim);font-size:13px}
</style>
</head>
<body>
<div class="breath" id="breath"><b id="breathN">—</b><span>INTERVAL</span></div>
<header class="top" id="top"></header>
<main class="stage" id="main"></main>
<div class="updbar" id="updBar">更新あり</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const KEY="archeryConverge.v1", APP_VER=2;
let db=load();
const ui={screen:"home",histId:null,adj:false};

function blankDb(){return{setups:[],sightMarks:[],sessions:[],active:null};}
function load(){try{const d=JSON.parse(localStorage.getItem(KEY));if(d?.sessions)return Object.assign(blankDb(),d);}catch(e){}return blankDb();}
function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function $(s,r){return (r||document).querySelector(s);}
function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}
function today(){return new Date().toISOString().slice(0,10);}
function fmtD(d){const x=new Date(d+"T12:00:00");return `${x.getMonth()+1}/${x.getDate()}`;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function ringW(fd){return fd/20;}
function arrR(fd){return fd/85;}
function lineR(fd){return arrR(fd)+fd/1200;}
function scoreAt(x,y,fd,t){const w=ringW(fd),r=Math.max(0,Math.hypot(x,y)-(t??lineR(fd)));if(r<=w/2)return{s:10,X:true};let s=11-Math.ceil(r/w);return{s:clamp(s,0,10),X:false};}
function rank(h){return h.s*2+(h.X?1:0);}
function lineCut(x,y,fd){return rank(scoreAt(x,y,fd,lineR(fd)))>rank(scoreAt(x,y,fd,0));}
function hitAt(x,y,fd){return Object.assign({x,y},scoreAt(x,y,fd,lineR(fd)));}
function lbl(a){return a.s===0?"M":a.X?"X":String(a.s);}
function stats(ar){const n=ar.length;if(!n)return null;const mx=ar.reduce((a,p)=>a+p.x,0)/n,my=ar.reduce((a,p)=>a+p.y,0)/n;
  let vx=0,vy=0;ar.forEach(p=>{vx+=(p.x-mx)**2;vy+=(p.y-my)**2;});vx/=n;vy/=n;return{n,mx,my,rr:Math.sqrt(vx+vy)};}
function mono(v,ax){const a=Math.abs(v).toFixed(1);return ax==="x"?(v>0?`+${a}`:v<0?`-${a}`:"0.0"):(v>0?`↑${a}`:v<0?`↓${a}`:"—");}

function targetSvg(fd,id){
  const w=ringW(fd),R=fd/2,M=R*1.18;
  const z=[[10,"#f5f3ee"],[9,"#f5f3ee"],[8,"#222"],[7,"#222"],[6,"#3d8fd4"],[5,"#3d8fd4"],[4,"#c73e3a"],[3,"#c73e3a"],[2,"#d4a72c"],[1,"#d4a72c"]];
  let g="";z.forEach(([k,f])=>{g+=`<circle cx="0" cy="0" r="${k*w}" fill="${f}" stroke="${f==="#222"?"#3a3a32":"#222"}" stroke-width="${R/280}"/>`;});
  g+=`<circle cx="0" cy="0" r="${w/2}" fill="none" stroke="#222" stroke-width="${R/280}"/>`;
  g+=`<line x1="${-w/5}" y1="0" x2="${w/5}" y2="0" stroke="#222" stroke-width="${R/280}"/>`;
  g+=`<line x1="0" y1="${-w/5}" x2="0" y2="${w/5}" stroke="#222" stroke-width="${R/280}"/>`;
  return `<svg class="face" id="${id}svg" viewBox="${-M} ${-M} ${2*M} ${2*M}" xmlns="http://www.w3.org/2000/svg">
    <g id="${id}g"><g>${g}</g><g id="${id}marks"></g><g id="${id}cur"></g></g></svg>`;
}
function dot(a,fd,c,l){const r=arrR(fd);return `<g><circle cx="${a.x}" cy="${-a.y}" r="${r}" fill="${c}" stroke="#fff" stroke-width="${r/5}" opacity=".92"/>`
  +(l?`<text x="${a.x}" y="${-a.y}" font-size="${r*1.1}" fill="#fff" text-anchor="middle" dominant-baseline="central" font-weight="bold">${l}</text>`:"")+`</g>`;}
function geoSvg(st,fd,sug){
  if(!st)return "";
  const M=fd/2*1.18;
  let h=`<line x1="${-M}" y1="0" x2="${M}" y2="0" stroke="var(--hit)" stroke-width="${fd/600}" opacity=".2"/>`;
  h+=`<line x1="0" y1="${-M}" x2="0" y2="${M}" stroke="var(--hit)" stroke-width="${fd/600}" opacity=".2"/>`;
  h+=`<circle cx="${st.mx}" cy="${-st.my}" r="${st.rr}" fill="none" stroke="var(--hit)" stroke-width="${fd/450}" opacity=".5" stroke-dasharray="${fd/50} ${fd/80}"/>`;
  h+=`<circle cx="${st.mx}" cy="${-st.my}" r="${fd/100}" fill="var(--warn)"/>`;
  if(sug&&(sug.h||sug.v))h+=`<line x1="0" y1="0" x2="${sug.h*.12}" y2="${-sug.v*.12}" stroke="var(--sight)" stroke-width="${fd/380}"/>`;
  return h;
}
function beatHtml(cur,pe){let h="";for(let i=0;i<pe;i++){const a=cur[i];
  if(a)h+=`<div class="beat on ${a.s>=9?"hi":""}"><span>${lbl(a)}</span></div>`;
  else h+=`<div class="beat ${i===cur.length?"cur":""}"></div>`;}return h;}

function sessArr(s){return [...s.ends.flat(),...s.cur];}
function sessTot(s){return sessArr(s).reduce((a,x)=>a+x.s,0);}

function breathPause(n,cb){const b=$("#breath"),bn=$("#breathN");bn.textContent=n;b.classList.add("on");
  setTimeout(()=>{b.classList.remove("on");setTimeout(cb,180);},580);}

function setTop(title,phase,back){
  $("#top").innerHTML=`
    ${back?`<button id="backBtn">${back}</button>`:`<span style="width:40px"></span>`}
    <div style="text-align:center;min-width:0"><h1>${title}</h1><div class="phase">${phase||""}</div></div>
    <span style="width:40px"></span>`;
  $("#backBtn")?.addEventListener("click",()=>nav("home"));
}

function nav(screen){ui.screen=screen;ui.histId=null;ui.adj=false;render();}

function render(){
  if(db.active&&ui.screen==="home")ui.screen=db.active.phase||"record";
  if(ui.screen==="home")return renderHome();
  if(ui.screen==="setup")return renderSetup();
  if(ui.screen==="record")return renderRecord();
  if(ui.screen==="return")return renderReturn();
  if(ui.screen==="done")return renderDone();
  if(ui.screen==="history")return ui.histId?renderHistDetail():renderHistory();
  if(ui.screen==="gear")return renderGear();
}

/* ── HOME ── */
function renderHome(){
  setTop("CONVERGE","",null);
  const last=db.sessions[db.sessions.length-1];
  $("#main").className="stage";
  $("#main").innerHTML=`
    <div class="home-hero">
      <div class="mark"><svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="none" stroke="#3a3a32" stroke-width="1"/>
        <circle cx="20" cy="20" r="10" fill="#c73e3a"/><circle cx="20" cy="20" r="4" fill="#d4a72c"/></svg></div>
      <button class="btn hit" id="goSetup">練習を始める</button>
      <p>弓を組み立ててサイトを確認し、<br>エンドごとに記録 → 戻って偏差を見る</p>
      ${last?`<p style="margin-top:14px">前回 ${fmtD(last.date)} ${last.dist}m · ${sessTot(last)}点</p>`:""}
      <div class="home-links">
        <button id="lnkHist">過去</button>
        <button id="lnkGear">装備</button>
        <button id="lnkBk">backup</button>
      </div>
    </div>`;
  $("#goSetup").onclick=()=>nav("setup");
  $("#lnkHist").onclick=()=>nav("history");
  $("#lnkGear").onclick=()=>nav("gear");
  $("#lnkBk").onclick=exportImport;
}

function exportImport(){
  const m=prompt("export と入力で保存、import で復元","export");
  if(m==="export"){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(db)]));a.download="converge-backup.json";a.click();}
  if(m==="import"){const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=()=>{const f=inp.files[0];if(!f)return;
    const r=new FileReader();r.onload=()=>{try{db=Object.assign(blankDb(),JSON.parse(r.result));save();toast("ok");render();}catch(e){toast("error");}};r.readAsText(f);};inp.click();}
}

/* ── SETUP: bow + sight before shooting ── */
function renderSetup(){
  const g=db.setups[0],last=db.sessions[db.sessions.length-1];
  const dist=ui._dist||(last?.dist||70);
  const mk=db.sightMarks.filter(m=>g&&m.setupId===g.id&&m.dist===dist).sort((a,b)=>b.date.localeCompare(a.date))[0];
  setTop("準備",`<span>${dist}</span><small>m</small>`,"←");
  $("#backBtn").onclick=()=>nav("home");
  $("#main").className="stage";
  $("#main").innerHTML=`
    <label class="f">距離</label>
    <div class="chips" id="dChips">${[70,50,30,18].map(d=>`<div class="chip ${d===dist?"on":""}" data-d="${d}">${d}m</div>`).join("")}</div>
    <label class="f">サイト（射る前の数値）</label>
    <div class="row"><input class="inp" id="sv" inputmode="decimal" placeholder="上下" value="${esc(mk?.v||"")}">
      <input class="inp" id="sh" inputmode="decimal" placeholder="左右" value="${esc(mk?.h||"")}"></div>
    <label class="f">メモ</label>
    <textarea class="inp" id="note" placeholder="組み立て・コンディション（任意）"></textarea>
    <button class="btn hit" id="start" style="margin-top:14px">射る</button>`;
  document.querySelectorAll("#dChips .chip").forEach(c=>c.onclick=()=>{ui._dist=+c.dataset.d;renderSetup();});
  $("#start").onclick=()=>{
    const v=$("#sv").value.trim(),h=$("#sh").value.trim();
    db.active={
      id:uid(),date:today(),setupId:g?.id||null,dist,faceD:dist>=60?122:dist<=18?40:80,perEnd:6,
      sightStart:{v,h},sightNow:{v,h},note:$("#note").value.trim(),
      phase:"record",ends:[],cur:[],adjLog:[]
    };
    if(g&&v||h)db.sightMarks.push({id:uid(),setupId:g.id,date:today(),dist,v,h,tag:"start"});
    save();ui.screen="record";render();
  };
}

/* ── RECORD: at target pulling arrows (B rhythm + A geo) ── */
function renderRecord(){
  const s=db.active;if(!s){nav("home");return;}
  s.phase="record";save();
  const n=s.cur.length,pe=s.perEnd,scale=.86+n/pe*.16;
  const tight=n>=3?"tighter":n>=1?"tight":"";
  const st=stats(s.cur);
  const sug=st&&st.n>=3?{h:Math.round(st.mx*1.2),v:Math.round(-st.my*1.2)}:null;
  setTop("記録",`E${s.ends.length+1}<small> · ${n}/${pe}</small>`,"");
  $("#main").className="stage "+tight;
  $("#main").innerHTML=`
    <div class="beats">${beatHtml(s.cur,pe)}</div>
    <div class="tg-box" id="tgBox" style="transform:scale(${scale})">
      <div style="position:relative">${targetSvg(s.faceD,"tg")}
        <div class="tg-geo"><svg viewBox="${-s.faceD/2*1.18} ${-s.faceD/2*1.18} ${s.faceD*1.18} ${s.faceD*1.18}" id="geoLive">${geoSvg(st,s.faceD,sug)}</svg></div>
        <div class="lens" id="lens"><svg id="lensSvg" width="116" height="116"><use href="#tgg"/></svg></div>
      </div>
    </div>
    <div class="drift">${st?`
      <div><div class="k">X</div><b>${mono(st.mx,"x")}</b></div>
      <div><div class="k">Y</div><b>${mono(st.my,"y")}</b></div>
      <div><div class="k">R</div><b>${st.rr.toFixed(1)}</b></div>`:`
      <div><div class="k">X</div><b>—</b></div><div><div class="k">Y</div><b>—</b></div><div><div class="k">R</div><b>—</b></div>`}
    </div>
    <button class="btn beat" id="backLine" ${n?``:`disabled`}>射線に戻った</button>
    <div class="act"><button class="btn ghost sm" id="undo">1本戻す</button></div>`;
  paintMarks(s);
  bindTarget(s);
  $("#undo").onclick=()=>{if(s.cur.length){s.cur.pop();save();renderRecord();}};
  $("#backLine").onclick=()=>{
    if(!s.cur.length)return;
    const t=s.cur.reduce((a,x)=>a+x.s,0);
    s.ends.push(s.cur);s.cur=[];
    save();
    breathPause(t,()=>{ui.screen="return";render();});
  };
}

function paintMarks(s){
  let mh="";s.ends.forEach(e=>e.forEach(a=>{mh+=dot(a,s.faceD,"rgba(74,222,128,.25)");}));
  s.cur.forEach(a=>{mh+=dot(a,s.faceD,"var(--hit)",lbl(a));});
  const mk=$("#tgmarks");if(mk)mk.innerHTML=mh;
}

function bindTarget(s){
  const svg=$("#tgsvg"),lens=$("#lens"),lensSvg=$("#lensSvg"),cur=$("#tgcur");
  let drag=null;
  function pt(e){const t=e.changedTouches?.[0]||e.touches?.[0]||e;return t?.clientX!=null?{x:t.clientX,y:t.clientY,id:e.pointerId??t.identifier??"m"}:null;}
  function toS(x,y){const c=svg.getScreenCTM();if(!c)return{x:0,y:0};const p=svg.createSVGPoint();p.x=x;p.y=y;const r=p.matrixTransform(c.inverse());return{x:r.x,y:-r.y};}
  function draw(p){const w=ringW(s.faceD),fine=drag?.fine,cut=fine&&lineCut(p.x,p.y,s.faceD);
    const col=fine?(cut?"var(--hit)":"var(--warn)"):"#fff";
    lens.classList.toggle("fine",!!fine);lens.classList.toggle("cut",!!cut);
    cur.innerHTML=`<circle cx="${p.x}" cy="${-p.y}" r="${arrR(s.faceD)}" fill="none" stroke="${col}" stroke-width="${s.faceD/400}"/>`;
    const z=ringW(s.faceD)*2.2;lensSvg.setAttribute("viewBox",`${p.x-z} ${-p.y-z} ${2*z} ${2*z}`);
    lens.style.left=p.x<0?"auto":"6px";lens.style.right=p.x<0?"6px":"auto";}
  function reset(){if(drag?.tm)clearTimeout(drag.tm);drag=null;cur.innerHTML="";lens.style.display="none";}
  svg.oncontextmenu=e=>e.preventDefault();
  function down(e){if(s.cur.length>=s.perEnd){toast("6本 — 戻る");return;}const cp=pt(e);if(!cp)return;e.preventDefault();
    try{svg.setPointerCapture(cp.id);}catch(_){}const p=toS(cp.x,cp.y);
    drag={p,raw:{x:cp.x,y:cp.y},fine:false,id:cp.id,tm:setTimeout(()=>{if(drag){drag.fine=true;draw(drag.p);}},400)};
    lens.style.display="block";draw(p);}
  function move(e){const cp=pt(e);if(!drag||cp.id!==drag.id)return;e.preventDefault();
    const a=toS(cp.x,cp.y),b=toS(drag.raw.x,drag.raw.y),k=drag.fine?.25:1;
    drag.p={x:drag.p.x+(a.x-b.x)*k,y:drag.p.y+(a.y-b.y)*k};drag.raw={x:cp.x,y:cp.y};draw(drag.p);}
  function up(e){const cp=pt(e);if(!drag||cp.id!==drag.id)return;e.preventDefault();clearTimeout(drag.tm);
    const M=s.faceD/2*1.18,p={x:clamp(drag.p.x,-M,M),y:clamp(drag.p.y,-M,M)};reset();
    const h=hitAt(p.x,p.y,s.faceD);s.cur.push({x:+h.x.toFixed(2),y:+h.y.toFixed(2),s:h.s,X:h.X});
    save();renderRecord();}
  svg.addEventListener("pointerdown",down);svg.addEventListener("pointermove",move);
  svg.addEventListener("pointerup",up);svg.addEventListener("pointercancel",reset);
}

/* ── RETURN: sight deviation after walking back (core concept) ── */
function renderReturn(){
  const s=db.active;if(!s){nav("home");return;}
  s.phase="return";save();
  const end=s.ends[s.ends.length-1]||[];
  const st=stats(end);
  const tot=end.reduce((a,x)=>a+x.s,0);
  const sug=st?{h:Math.round(st.mx*1.2),v:Math.round(-st.my*1.2)}:null;
  const sv=s.sightNow?.v??"",sh=s.sightNow?.h??"";
  const s0=s.sightStart||{};
  setTop("サイト確認",`E${s.ends.length}`,"");
  $("#main").className="stage";
  $("#main").innerHTML=`
    <div class="end-sum"><b>${tot}</b><span>${end.map(lbl).join(" · ")}</span></div>
    <div class="tg-box" style="transform:scale(.72)">
      <div style="position:relative">${targetSvg(s.faceD,"rt")}
        <div class="tg-geo"><svg viewBox="${-s.faceD/2*1.18} ${-s.faceD/2*1.18} ${s.faceD*1.18} ${s.faceD*1.18}">${geoSvg(st,s.faceD,sug)}</svg></div>
      </div>
    </div>
    <div class="drift">${st?`
      <div><div class="k">X</div><b>${mono(st.mx,"x")}</b></div>
      <div><div class="k">Y</div><b>${mono(st.my,"y")}</b></div>
      <div><div class="k">R</div><b>${st.rr.toFixed(1)}</b></div>`:""}
    </div>
    <div class="sight-diff">
      <div class="row"><span>練習開始</span><span>上下 ${esc(s0.v||"—")} / 左右 ${esc(s0.h||"—")}</span></div>
      <div class="row"><span>いま</span><span>上下 ${esc(sv||"—")} / 左右 ${esc(sh||"—")}</span></div>
      ${sug&&(sug.h||sug.v)?`<div class="row"><span>目安</span><span class="chg">左右 ${sug.h>0?"+":""}${sug.h} · 上下 ${sug.v>0?"+":""}${sug.v}</span></div>`:""}
      <div class="note">的の前で記録 → 戻ってサイトを見る、の流れです</div>
    </div>
    ${ui.adj?`<label class="f">調整後のサイト</label><div class="row">
      <input class="inp" id="nv" value="${esc(sv)}" placeholder="上下"><input class="inp" id="nh" value="${esc(sh)}" placeholder="左右"></div>
      <textarea class="inp" id="adjNote" placeholder="調整メモ（任意）" style="margin-top:8px"></textarea>`:""}
    <div class="act">
      <button class="btn ghost" id="adjBtn">${ui.adj?"保存":"サイトを調整した"}</button>
      <button class="btn hit" id="next">次のエンド</button>
    </div>
    <button class="btn ghost" id="fin">練習を終える</button>`;
  let mh="";end.forEach(a=>{mh+=dot(a,s.faceD,"var(--hit)",lbl(a));});$("#rtmarks").innerHTML=mh;
  $("#adjBtn").onclick=()=>{
    if(!ui.adj){ui.adj=true;renderReturn();return;}
    const nv=$("#nv").value.trim(),nh=$("#nh").value.trim();
    s.sightNow={v:nv,h:nh};
    s.adjLog.push({end:s.ends.length,date:Date.now(),v:nv,h:nh,note:$("#adjNote").value.trim()});
    const g=db.setups[0];
    if(g)db.sightMarks.push({id:uid(),setupId:g.id,date:today(),dist:s.dist,v:nv,h:nh,tag:"adj"});
    ui.adj=false;save();toast("記録した");renderReturn();
  };
  $("#next").onclick=()=>{ui.screen="record";ui.adj=false;render();};
  $("#fin").onclick=()=>{
    db.sessions.push({...s,cur:[],total:sessTot(s)});delete db.active;save();ui.screen="done";render();
  };
}

/* ── DONE ── */
function renderDone(){
  const s=db.sessions[db.sessions.length-1];
  setTop("終了","",null);
  $("#main").className="stage";
  $("#main").innerHTML=s?`
    <div class="end-sum" style="padding:24px 0"><b>${sessTot(s)}</b><span>${s.ends.length}E · ${s.dist}m</span></div>
    <div class="sight-diff">
      <div class="row"><span>開始サイト</span><span>${esc(s.sightStart?.v||"—")} / ${esc(s.sightStart?.h||"—")}</span></div>
      <div class="row"><span>最終</span><span>${esc(s.sightNow?.v||"—")} / ${esc(s.sightNow?.h||"—")}</span></div>
      ${(s.adjLog||[]).length?`<div class="note">調整 ${s.adjLog.length} 回</div>`:""}
    </div>
    <button class="btn hit" id="home">ホームへ</button>`:`<div class="empty">—</div>`;
  $("#home")?.onclick=()=>nav("home");
}

/* ── HISTORY ── */
function renderHistory(){
  setTop("過去","", "←");$("#backBtn").onclick=()=>nav("home");
  const ss=[...db.sessions].reverse();
  $("#main").className="stage";
  $("#main").innerHTML=ss.length?ss.map(s=>`
    <div class="s-row" data-id="${s.id}"><div><div class="d">${fmtD(s.date)} · ${s.dist}m</div>
      <div class="m">${s.ends.length}E${s.note?` · ${esc(s.note)}`:""}</div></div><div class="pts">${sessTot(s)}</div></div>`).join("")
    :`<div class="empty">なし</div>`;
  $("#main").querySelectorAll(".s-row").forEach(r=>r.onclick=()=>{ui.histId=r.dataset.id;render();});
}

function renderHistDetail(){
  const s=db.sessions.find(x=>x.id===ui.histId);
  if(!s){ui.histId=null;return renderHistory();}
  setTop(fmtD(s.date),`${s.dist}m`,"←");$("#backBtn").onclick=()=>{ui.histId=null;render();};
  const st=stats(sessArr(s));
  $("#main").className="stage";
  $("#main").innerHTML=`
    <div class="tg-box" style="transform:scale(.8)"><div style="position:relative">${targetSvg(s.faceD,"hs")}
      <div class="tg-geo"><svg viewBox="${-s.faceD/2*1.18} ${-s.faceD/2*1.18} ${s.faceD*1.18} ${s.faceD*1.18}">${geoSvg(st,s.faceD,null)}</svg></div>
    </div></div>
    <div class="drift">${st?`<div><div class="k">X</div><b>${mono(st.mx,"x")}</b></div><div><div class="k">Y</div><b>${mono(st.my,"y")}</b></div><div><div class="k">R</div><b>${st.rr.toFixed(1)}</b></div>`:""}
    </div>
    <button class="btn ghost" id="del">削除</button>`;
  let mh="";s.ends.forEach((e,i)=>e.forEach(a=>{mh+=dot(a,s.faceD,`hsl(${120+i*30},50%,45%)`);}));$("#hsmarks").innerHTML=mh;
  $("#del").onclick=()=>{if(confirm("削除？")){db.sessions=db.sessions.filter(x=>x.id!==s.id);save();ui.histId=null;render();}};
}

/* ── GEAR ── */
function renderGear(){
  const g=db.setups[0]||{name:"",bow:""};
  setTop("装備","", "←");$("#backBtn").onclick=()=>nav("home");
  $("#main").className="stage";
  $("#main").innerHTML=`
    <label class="f">NAME</label><input class="inp" id="gn" value="${esc(g.name)}">
    <label class="f">BOW</label><input class="inp" id="gb" value="${esc(g.bow)}">
    <button class="btn hit" id="gs" style="margin-top:12px">保存</button>`;
  $("#gs").onclick=()=>{const d={id:g.id||uid(),name:$("#gn").value.trim()||"main",bow:$("#gb").value.trim()};
    if(db.setups.length)db.setups[0]=d;else db.setups.push(d);save();toast("ok");};
}

if("serviceWorker"in navigator&&(location.protocol==="https:"||location.hostname==="localhost")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
function checkUp(){if(location.protocol==="file:")return;fetch("version.json?"+Date.now(),{cache:"no-store"}).then(r=>r.json()).then(j=>{if(j?.v>APP_VER)$("#updBar").style.display="block";}).catch(()=>{});}
$("#updBar").onclick=()=>location.reload();
document.addEventListener("visibilitychange",()=>{if(!document.hidden)checkUp();});
checkUp();render();
</script>

<noscript>
  <div class="static-landing">
    <h1>着弾が、収束する。</h1>
    <p>Converge — 的の前で記録し、戻れば集まりが見える。JavaScript を有効にすると起動します。</p>
    <ol>
      <li>距離・風・サイトの目盛りを入力する</li>
      <li>的の前で刺さった場所をタップして6本記録する</li>
      <li>射線に戻り、グルーピングとサイト提案を確認する</li>
    </ol>
    <p><a href="https://eita115115.github.io/archery-converge/">https://eita115115.github.io/archery-converge/</a></p>
  </div>
</noscript>
<div class="pulse" id="pulse"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="var(--hit)" stroke-width="3" opacity=".4"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="var(--warn)" stroke-width="2" opacity=".6"/>
  <text x="50" y="54" class="val" id="pulseN" text-anchor="middle">—</text></svg></div>

    <h1>着弾が、収束する。</h1>
    <p>Converge — 的の前で記録し、戻れば集まりが見えるアーチェリー練習アプリ。オフライン対応。</p>
    <ol>
      <li><strong>準備</strong> — 距離・風・サイトの数字を入力</li>
      <li><strong>記録</strong> — 的の上で着弾位置をタップ（6本）</li>
      <li><strong>確認</strong> — 散布の中心とサイトを動かす方向を見る</li>

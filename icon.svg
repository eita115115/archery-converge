<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Converge">
  <!--
    Skin-ring palette (outer → areola → nipple), Apple-style polish:
    #FEE7D9 #FBD5C0 #FDC9AD #FEBCA6 #FDB09E #EBC39E #D7AD93 #E1B9B9 #D69FA0 #B28278
  -->
  <defs>
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#faf9f6"/>
      <stop offset="100%" stop-color="#f0ebe4"/>
    </linearGradient>
    <radialGradient id="sheen" cx="34%" cy="28%" r="58%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".55"/>
      <stop offset="38%" stop-color="#fff" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shade" cx="52%" cy="78%" r="52%">
      <stop offset="0%" stop-color="#9a6d5f" stop-opacity=".16"/>
      <stop offset="100%" stop-color="#9a6d5f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nip" cx="40%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#d4a090"/>
      <stop offset="42%" stop-color="#b28278"/>
      <stop offset="100%" stop-color="#8f564c"/>
    </radialGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2.2" stdDeviation="3.2" flood-color="#8a5f52" flood-opacity=".22"/>
    </filter>
    <clipPath id="ios">
      <rect width="100" height="100" rx="22.5" ry="22.5"/>
    </clipPath>
    <clipPath id="breast">
      <ellipse cx="50" cy="49" rx="44" ry="40.5"/>
    </clipPath>
  </defs>

  <g clip-path="url(#ios)">
    <rect width="100" height="100" fill="url(#bg)"/>

    <g clip-path="url(#breast)" filter="url(#lift)">
      <!-- soft rings: no strokes, organic ellipse -->
      <ellipse cx="50" cy="49" rx="44" ry="40.5" fill="#FEE7D9"/>
      <ellipse cx="50" cy="49" rx="39.6" ry="36.4" fill="#F8D2B8" opacity=".98"/>
      <ellipse cx="50" cy="49" rx="35.2" ry="32.3" fill="#FDC9AD" opacity=".97"/>
      <ellipse cx="50" cy="49" rx="30.8" ry="28.2" fill="#FEBCA6" opacity=".96"/>
      <ellipse cx="50" cy="49" rx="26.4" ry="24.2" fill="#F5A894" opacity=".95"/>
      <ellipse cx="50" cy="49" rx="22" ry="20.2" fill="#EBC39E" opacity=".94"/>
      <ellipse cx="50" cy="49" rx="17.6" ry="16.1" fill="#D7AD93" opacity=".93"/>
      <ellipse cx="50" cy="49" rx="13.2" ry="12.1" fill="#E1B9B9" opacity=".92"/>
      <ellipse cx="50" cy="49" rx="8.8" ry="8.1" fill="#D69FA0" opacity=".9"/>
      <ellipse cx="50" cy="49" rx="5.2" ry="4.8" fill="#C89C88" opacity=".88"/>

      <ellipse cx="50" cy="49" rx="44" ry="40.5" fill="url(#sheen)"/>
      <ellipse cx="50" cy="49" rx="44" ry="40.5" fill="url(#shade)"/>

      <!-- areola -->
      <ellipse cx="50" cy="49.5" rx="6.8" ry="6.2" fill="#d9a0a0" opacity=".55"/>
      <!-- nipple -->
      <ellipse cx="50" cy="49.8" rx="2.35" ry="2.15" fill="url(#nip)"/>
      <ellipse cx="49.1" cy="48.7" rx=".85" ry=".5" fill="#fff" opacity=".5"/>
    </g>
  </g>
</svg>
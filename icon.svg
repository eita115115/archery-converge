<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Converge">
  <defs>
    <linearGradient id="bg" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0%" stop-color="#faf9f6"/>
      <stop offset="100%" stop-color="#f0ebe4"/>
    </linearGradient>
    <radialGradient id="face" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="70%" stop-color="#f5f3ee"/>
      <stop offset="100%" stop-color="#e8e4dc"/>
    </radialGradient>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.8" flood-color="#1c1b19" flood-opacity=".14"/>
    </filter>
    <clipPath id="ios">
      <rect width="100" height="100" rx="22.5" ry="22.5"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ios)">
    <rect width="100" height="100" fill="url(#bg)"/>
    <g filter="url(#lift)">
      <circle cx="50" cy="50" r="38" fill="url(#face)" stroke="#d8d5cd" stroke-width=".6"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#1c1b19" stroke-width="1.1" opacity=".12"/>
      <circle cx="50" cy="50" r="22" fill="none" stroke="#1c1b19" stroke-width="1.1" opacity=".18"/>
      <circle cx="50" cy="50" r="14" fill="none" stroke="#1c1b19" stroke-width="1.1" opacity=".22"/>
      <circle cx="50" cy="50" r="6" fill="#1c1b19"/>
      <circle cx="50" cy="50" r="2.2" fill="#d4a72c"/>
    </g>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Palette refs (SchemeColor / color-hex):
    Outer skin  — Tones of Neutral Peach: #FEE7D9 #FBD5C0 #FDC9AD #FEBCA6 #FDB09E
    Mid skin    — Gentle Makeup: #EBC39E #D7AD93 #C89C88
    Areola      — Baby Soft Skin: #E1B9B9 #D69FA0
    Nipple core — Gentle Makeup Heather Cinnamon #B28278 → #9A6358
  -->
  <defs>
    <linearGradient id="bg" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#fffcf8"/>
      <stop offset="100%" stop-color="#f3ebe2"/>
    </linearGradient>
    <radialGradient id="vol" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".42"/>
      <stop offset="42%" stop-color="#fff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#c98f7a" stop-opacity=".12"/>
    </radialGradient>
    <radialGradient id="nip" cx="42%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#c99a8c"/>
      <stop offset="45%" stop-color="#b28278"/>
      <stop offset="100%" stop-color="#8f564c"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.6" flood-color="#9a6d5f" flood-opacity=".24"/>
    </filter>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <g transform="translate(50 50)" filter="url(#soft)">
    <!-- WA face layout: 10 rings, all skin tones (light outside → areola inside) -->
    <circle r="45.0" fill="#FEE7D9" stroke="#ddb896" stroke-width=".42"/>
    <circle r="40.5" fill="#F8D2B8" stroke="#d9a888" stroke-width=".4"/>
    <circle r="36.0" fill="#FDC9AD" stroke="#d9987c" stroke-width=".38"/>
    <circle r="31.5" fill="#FEBCA6" stroke="#d08872" stroke-width=".38"/>
    <circle r="27.0" fill="#F5A894" stroke="#cc7d68" stroke-width=".36"/>
    <circle r="22.5" fill="#EBC39E" stroke="#c08a6a" stroke-width=".36"/>
    <circle r="18.0" fill="#D7AD93" stroke="#b07d62" stroke-width=".34"/>
    <circle r="13.5" fill="#E1B9B9" stroke="#b88484" stroke-width=".34"/>
    <circle r="9.0"  fill="#D69FA0" stroke="#b07072" stroke-width=".32"/>
    <circle r="4.5"  fill="#C89C88" stroke="#a06e5c" stroke-width=".3"/>

    <!-- nipple -->
    <circle r="2.15" fill="url(#nip)" stroke="#7a4840" stroke-width=".22"/>
    <ellipse cx="-0.55" cy="-0.75" rx="0.75" ry="0.45" fill="#fff" opacity=".45"/>

    <!-- soft breast volume -->
    <circle r="45" fill="url(#vol)"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#fffcf7"/>
      <stop offset="50%" stop-color="#f7f0e8"/>
      <stop offset="100%" stop-color="#ebe2d6"/>
    </linearGradient>
    <radialGradient id="skin" cx="44%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#fff9f6"/>
      <stop offset="32%" stop-color="#ffe2d8"/>
      <stop offset="68%" stop-color="#f4b5a8"/>
      <stop offset="100%" stop-color="#de8f84"/>
    </radialGradient>
    <radialGradient id="shade" cx="62%" cy="78%" r="48%">
      <stop offset="0%" stop-color="#b86b62" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#b86b62" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gloss" cx="38%" cy="24%" r="38%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".78"/>
      <stop offset="55%" stop-color="#fff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2.2" stdDeviation="2.8" flood-color="#7a4f48" flood-opacity=".2"/>
    </filter>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="none" stroke="#e5dbd0" stroke-width=".75"/>

  <!-- single breast: chest wall on left, fuller curve below -->
  <g filter="url(#lift)">
    <path d="M24 68 C22 52 30 34 48 27 C62 24 74 34 78 50 C81 64 74 78 58 83 C42 86 28 80 24 68 Z"
          fill="url(#skin)" stroke="#dfa398" stroke-width="1" stroke-linejoin="round"/>
    <path d="M24 68 C22 52 30 34 48 27 C62 24 74 34 78 50 C81 64 74 78 58 83 C42 86 28 80 24 68 Z"
          fill="url(#shade)"/>
    <path d="M24 68 C22 52 30 34 48 27 C62 24 74 34 78 50 C81 64 74 78 58 83 C42 86 28 80 24 68 Z"
          fill="url(#gloss)"/>
    <path d="M24 52 C24 44 28 38 34 36" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" opacity=".35"/>
  </g>

  <!-- nipple = WA 122 face (same palette as in-app target) -->
  <g transform="translate(54 48)">
    <circle r="20.5" fill="#f5f3ee" stroke="#2a2620" stroke-width=".5"/>
    <circle r="18.5" fill="#f5f3ee" stroke="#2a2620" stroke-width=".45"/>
    <circle r="14.8" fill="#222" stroke="#3a3a32" stroke-width=".42"/>
    <circle r="11.1" fill="#222" stroke="#3a3a32" stroke-width=".4"/>
    <circle r="7.4" fill="#3d8fd4" stroke="#2a2620" stroke-width=".38"/>
    <circle r="3.7" fill="#c73e3a" stroke="#2a2620" stroke-width=".35"/>
    <circle r="1.85" fill="#d4a72c" stroke="#2a2620" stroke-width=".3"/>
    <line x1="-2.8" y1="0" x2="2.8" y2="0" stroke="#2a2620" stroke-width=".32"/>
    <line x1="0" y1="-2.8" x2="0" y2="2.8" stroke="#2a2620" stroke-width=".32"/>
    <ellipse cx="-5" cy="-6.2" rx="2.4" ry="1.3" fill="#fff" opacity=".4"/>
  </g>

  <ellipse cx="42" cy="34" rx="10" ry="6.5" fill="#fff" opacity=".48" transform="rotate(-14 42 34)"/>
</svg>